<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>消化器マスター (対策編)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000000;
  --card:#000000;
  --border:#2f3336;
  --text:#e7e9ea;
  --sub:#71767b;
  --accent:#1d9bf0;
  --heart:#f91880;
  --rt:#00ba7c;
  --blank-bg:rgba(255,255,255,0.1);
  --blank-reveal:transparent;
  --blank-text:var(--accent);
}
html,body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.5;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}
#top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#top-bar.hidden{transform:translateY(-100%)}

#header{
  height:53px;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);
  padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.header-left, .header-right { width:60px; display:flex; align-items:center; }
.header-right { justify-content:flex-end; }
.header-center { flex:1; display:flex; justify-content:center; }
.x-logo { width:24px; height:24px; fill:var(--text); }
.profile-icon { width:32px; height:32px; border-radius:50%; background-color:#1d9bf0; overflow:hidden; }
.profile-icon img { width:100%; height:100%; object-fit:cover; }
#progress{font-size:13px;color:var(--text);font-weight:700}

#tabs{
  background:rgba(0,0,0,0.65);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
#tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;padding:16px 16px;font-size:15px;font-weight:500;
  color:var(--sub);cursor:pointer;white-space:nowrap;
  position:relative;transition:color 0.2s;
}
.tab:hover{background:rgba(255,255,255,0.03)}
.tab.active{color:var(--text);font-weight:700}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:16px;right:16px;
  height:4px;background:var(--accent);border-radius:2px;
}

#controls{
  display:flex;gap:8px;padding:116px 16px 10px;
  border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.ctrl-btn{
  padding:6px 16px;border-radius:9999px;font-size:14px;font-weight:700;
  border:1px solid var(--border);background:var(--bg);
  color:var(--text);cursor:pointer;transition:background 0.2s;
}
.ctrl-btn:hover{background:rgba(255,255,255,0.1)}
.ctrl-btn.on{
  background:var(--text);color:var(--bg);border-color:var(--text);
}

#timeline{padding-bottom:80px}

.card{
  display:flex;padding:12px 16px;
  border-bottom:1px solid var(--border);
  transition:opacity 0.3s;
}
.card.mastered{opacity:0.35}
.card-left{margin-right:12px;display:flex;flex-direction:column;align-items:center}
.card-right{flex:1;min-width:0}

.avatar{
  width:40px;height:40px;border-radius:50%;
  background:#16181c;display:flex;align-items:center;
  justify-content:center;font-size:24px;
}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:2px;
}
.meta{
  display:flex;align-items:center;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
.display-name{
  font-weight:700;font-size:15px;color:var(--text);margin-right:4px;
}
.display-name:hover{text-decoration:underline}
.handle,.time,.dot{color:var(--sub);font-size:15px}
.dot{margin:0 4px}

.card-body{
  font-size:15px;line-height:20px;
  word-wrap:break-word;white-space:pre-wrap;
  margin-top:2px;
}

.blank{
  display:inline-block;padding:0 6px;margin:0 2px;
  border-radius:4px;background:var(--blank-bg);
  color:var(--text);cursor:pointer;font-size:15px;
  border:none;line-height:inherit;transition:all 0.2s;
  font-family:inherit;
}
.blank:active{opacity:0.7}
.blank.revealed{
  background:var(--blank-reveal);color:var(--blank-text);
}

.actions{
  display:flex;justify-content:space-between;
  margin-top:12px;max-width:425px;
}
.action-group{display:flex;align-items:center}
.right-actions{gap:12px}
.action-btn{
  display:flex;align-items:center;background:none;border:none;
  color:var(--sub);cursor:pointer;font-size:13px;
  transition:color 0.2s;padding:0;
}
.action-btn .icon{
  display:flex;align-items:center;justify-content:center;
  width:34.75px;height:34.75px;border-radius:50%;
  transition:background-color 0.2s;
}
.action-btn svg{width:18.75px;height:18.75px;fill:currentColor}
.action-btn .count{padding:0 12px 0 0}

.reply-btn:hover{color:var(--accent)}
.reply-btn:hover .icon{background-color:rgba(29,155,240,0.1)}
.rt-btn:hover{color:var(--rt)}
.rt-btn:hover .icon{background-color:rgba(0,186,124,0.1)}
.like-btn:hover{color:var(--heart)}
.like-btn:hover .icon{background-color:rgba(249,24,128,0.1)}
.like-btn.hearted{color:var(--heart)}
.like-btn.hearted svg{fill:var(--heart)}
.view-btn:hover,.bm-btn:hover,.share-btn:hover{color:var(--accent)}
.view-btn:hover .icon,.bm-btn:hover .icon,.share-btn:hover .icon{background-color:rgba(29,155,240,0.1)}

.empty-msg{
  text-align:center;color:var(--sub);padding:60px 20px;font-size:15px;
}

#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:53px;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;align-items:center;
  z-index:100;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#bottom-nav.hidden{transform:translateY(100%)}
.nav-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;height:100%;color:var(--text);position:relative;cursor:pointer;
}
.nav-item svg{width:26.25px;height:26.25px;fill:currentColor}
.active-dot{
  position:absolute;top:4px;width:4px;height:4px;
  background-color:var(--accent);border-radius:50%;
}

#fab{
  position:fixed;bottom:69px;right:16px;width:56px;height:56px;
  border-radius:50%;background-color:var(--accent);
  display:flex;justify-content:center;align-items:center;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  z-index:99;cursor:pointer;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
#fab svg{width:24px;height:24px;fill:#fff}
#fab.hidden{transform:translateY(150px)}
</style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <header id="header">
      <div class="header-left">
        <div class="profile-icon">
          <img src="https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png" alt="profile">
        </div>
      </div>
      <div class="header-center">
        <svg viewBox="0 0 24 24" class="x-logo"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.005 4.094H5.03z" fill="currentColor"></path></svg>
      </div>
      <div class="header-right">
        <span id="progress"></span>
      </div>
    </header>
    <nav id="tabs"></nav>
  </div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-unmastered" onclick="toggleUnmastered()">未回答のみ</button>
    <button class="ctrl-btn" id="btn-shuffle" onclick="shuffleCards()">シャッフル</button>
    <button class="ctrl-btn" id="btn-unshuffle" onclick="resetShuffle()">元の順序</button>
    <button class="ctrl-btn" id="btn-reveal-all" onclick="revealAll()">全て表示</button>
    <button class="ctrl-btn" id="btn-reset-all" onclick="resetAll()">全リセット</button>
  </div>
  <main id="timeline"></main>
</div>

<div id="bottom-nav">
  <div class="nav-item active">
    <div class="active-dot"></div>
    <svg viewBox="0 0 24 24"><path d="M12 1.696L.622 8.807l1.06 1.696L3 9.679V19.5C3 20.881 4.119 22 5.5 22h13c1.381 0 2.5-1.119 2.5-2.5V9.679l1.318.824 1.06-1.696L12 1.696z" fill="currentColor"></path></svg>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"></path></svg>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M14.613 5.485L9.387 18.515l-1.874-.63 5.226-13.03 1.874.63zM21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9zm-2 0c0-3.86-3.14-7-7-7s-7 3.14-7 7 3.14 7 7 7 7-3.14 7-7z"></path></svg>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M19.993 9.042C19.946 4.092 16.035.1 11.996.1S4.046 4.091 4.004 9.042c-.019 2.213-.889 4.316-2.428 5.922l-.285.297v2.211h6.634c.488 1.436 1.849 2.428 3.42 2.428h.023c1.583 0 2.944-1.006 3.424-2.463h6.611v-2.193l-.288-.302c-1.531-1.604-2.399-3.702-2.417-5.908h2.305zm-3.468 8.43h-8.99v-.111c1.265-1.488 2.05-3.411 2.067-5.38.037-3.96 3.12-7.228 6.945-7.228h.01c3.812 0 6.892 3.256 6.94 7.213.018 1.956.794 3.864 2.046 5.342v.164h-9.018z"></path></svg>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M1.998 5.5c0-1.381 1.119-2.5 2.5-2.5h15c1.381 0 2.5 1.119 2.5 2.5V18.5c0 1.381-1.119 2.5-2.5 2.5h-15c-1.381 0-2.5-1.119-2.5-2.5V5.5zm15 11v-7.39l-6.91 5.86c-1.19.92-2.99.92-4.18 0l-6.91-5.86v7.39h18zm-15-9.61v-.39h15v.39l-6.91 5.86c-.59.46-1.5.46-2.09 0L1.998 6.89z"></path></svg>
  </div>
</div>

<div id="fab">
  <svg viewBox="0 0 24 24"><path d="M11 11V4h2v7h7v2h-7v7h-2v-7H4v-2h7z"></path></svg>
</div>

<script>
const QUIZ_DATA = [{"title": "消化管総論", "short": "総論", "icon": "🔴", "questions": [{"id": "t-1-1", "text": "腹部診察の順番は、触診による腸管への刺激を避けるため、【 ① 】→【 ② 】→【 ③ 】→【 ④ 】の順で行うのが鉄則である。", "blanks": {"①": "視診", "②": "聴診", "③": "打診", "④": "触診"}}, {"id": "t-1-2", "text": "医療面接において、冷汗を伴う患者やバイタルサインが不安定な患者は【 ⑤ 】が高いと判断し、十分な面接よりも先に蘇生処置やバイタル確認を優先する。", "blanks": {"⑤": "緊急性"}}, {"id": "t-1-3", "text": "【 ⑥ 】は眼球結膜の黄染で確認できるが、視覚的に認識できない状態を【 ⑦ 】と呼ぶ。", "blanks": {"⑥": "顕性黄疸", "⑦": "不顕性黄疸"}}, {"id": "t-1-4", "text": "腹痛の部位と疾患の組み合わせとして、【 ⑧ 】への移動性腹痛は急性虫垂炎、空腹時の心窩部痛は【 ⑨ 】、脂肪摂取後の増悪は【 ⑩ 】や膵炎を疑う。", "blanks": {"⑧": "右下腹部痛", "⑨": "十二指腸潰瘍", "⑩": "胆石症"}}, {"id": "t-1-5", "text": "消化管穿孔が疑われる場合、立位の胸部または腹部単純X線検査で横隔膜下に【 ⑪ 】を確認する。", "blanks": {"⑪": "free air / 鏡面像（遊離ガス）"}}, {"id": "t-1-6", "text": "腸閉塞（イレウス）を疑う場合、腹部単純X線検査で【 ⑫ 】を認める。", "blanks": {"⑫": "鏡面像 / ニボー / air-fluid level"}}, {"id": "t-1-7", "text": "上部消化管内視鏡検査において、白色光では発見しにくい微細な癌や血管構造を強調する手法として【 ⑬ 】がある。", "blanks": {"⑬": "NBI / 狭帯域光観察"}}, {"id": "t-1-8", "text": "肝・胆・膵などの実質臓器の診断には、消化管への内視鏡とは別に【 ⑭ 】やCT、MRI(MRCP)が多用される。", "blanks": {"⑭": "腹部超音波検査 / エコー"}}, {"id": "t-1-9", "text": "消化管出血による出血性ショックの臨床的兆候（ショックの5P）は、蒼白、虚脱、冷汗、脈拍触知困難、および【 ⑮ 】である。", "blanks": {"⑮": "呼吸困難・促迫"}}, {"id": "t-1-10", "text": "上部消化管出血では、血液が腸内細菌により分解され尿素が生成・吸収されるため、血液生化学検査で【 ⑯ 】が上昇する特徴がある。", "blanks": {"⑯": "BUN / 尿素窒素"}}, {"id": "t-1-11", "text": "出血性ショックが疑われる場合、まず行うべきはバイタル確認と【 ⑰ 】である。", "blanks": {"⑰": "血管確保 / 輸液"}}, {"id": "t-1-12", "text": "腫瘍に対する内視鏡的治療（ESDなど）は、【 ⑱ 】の可能性が極めて低い病変が適応となる。", "blanks": {"⑱": "リンパ節転移"}}, {"id": "t-1-13", "text": "腹腔鏡下手術は、開腹手術に比べて【 ⑲ 】が少なく、術後の【 ⑳ 】が短縮されるなどの低侵襲なメリットがある。", "blanks": {"⑲": "出血量", "⑳": "在院日数"}}, {"id": "t-1-14", "text": "ストーマ（人工肛門）を有する患者でも、装具の発達により【 ㉑ 】を高く保つことが可能となっている。", "blanks": {"㉑": "QOL / 生活の質"}}, {"id": "t-1-15", "text": "わが国のヘリコバクター・ピロリ感染率は全世代で【 ㉒ 】傾向にあるが、感染成立は主に【 ㉓ 】である。", "blanks": {"㉒": "低下", "㉓": "幼少期"}}, {"id": "t-1-16", "text": "炎症性腸疾患（UC, CD）の罹患率・有病率は、日本を含むアジアにおいて【 ㉔ 】に該当し、増加傾向にある。", "blanks": {"㉔": "Acceleration in Incidence / 急増期"}}]}, {"title": "上部消化管（食道）ブロック", "short": "食道", "icon": "🟡", "questions": [{"id": "t-2-1", "text": "**胃食道逆流症（GERD）**において、内視鏡で粘膜傷害を認めないものを【 ① 】と呼ぶ。これは典型的な逆流性食道炎と比較して、PPI（プロトンポンプ阻害薬）の【 ② 】が低い傾向にある。", "blanks": {"①": "非びらん性逆流症 / NERD", "②": "奏効率"}}, {"id": "t-2-2", "text": "GERDの診断において、強力な酸分泌抑制薬を投与し症状の改善を確認する手法を【 ③ 】という。", "blanks": {"③": "PPIテスト"}}, {"id": "t-2-3", "text": "GERDに対する外科的治療（逆流防止術）の代表的な術式は、腹腔鏡下【 ④ 】法である。逆流防止効果の強さは、Nissen法 ＞ Toupet法 ＞ Dor法の順である。", "blanks": {"④": "Nissen / ニッセン"}}, {"id": "t-2-4", "text": "**食道アカラシア**は、下部食道括約筋（LES）の【 ⑤ 】と食道体部の【 ⑥ 】を主徴とする疾患であり、確定診断には【 ⑦ 】が必須である。", "blanks": {"⑤": "弛緩不全", "⑥": "蠕動消失", "⑦": "食道内圧検査 / HRM"}}, {"id": "t-2-5", "text": "アカラシアの画像所見では、食道透視（バリウム）での下部食道の急激な狭窄【 ⑧ 】サインや、内視鏡での噴門部の【 ⑨ 】状のひだ集中が特徴である。", "blanks": {"⑧": "Bird beak / 鳥のくちばし", "⑨": "Rosetta / ロゼッタ"}}, {"id": "t-2-6", "text": "アカラシアに対する最新の低侵襲治療として、内視鏡下で環状筋を切開する【 ⑩ 】が普及している。", "blanks": {"⑩": "POEM / 経口内視鏡的筋層切開術"}}, {"id": "t-2-7", "text": "嘔吐後に食道壁が全層破裂する【 ⑪ 】症候群は、緊急手術の適応となることが多く、破裂部位は【 ⑫ 】に多い。", "blanks": {"⑪": "Boerhaave / ブールハーフェ", "⑫": "下部食道左側"}}, {"id": "t-2-8", "text": "食道憩室のうち、咽頭食道境界部の後壁に生じる圧出性憩室を【 ⑬ 】憩室、気管分岐部付近に生じる牽引性憩室を【 ⑭ 】憩室と呼ぶ。", "blanks": {"⑬": "Zenker / ツェンカー", "⑭": "Rokitansky / ロキタンスキー"}}, {"id": "t-2-9", "text": "わが国の食道癌の約90％以上は【 ⑮ 】であり、好発部位は【 ⑯ 】である。", "blanks": {"⑮": "扁平上皮癌", "⑯": "胸部中部食道"}}, {"id": "t-2-10", "text": "食道癌の診断において【 ⑰ 】液を散布すると、正常粘膜はグリコーゲンと反応して茶褐色に染まるが、癌部は【 ⑱ 】として認識される。", "blanks": {"⑰": "ヨード", "⑱": "不染域 / 染まらない"}}, {"id": "t-2-11", "text": "内視鏡の【 ⑲ 】を用いると、癌の発見率が白色光の約55%から約【 ⑳ 】%へと飛躍的に向上する。", "blanks": {"⑲": "NBI / 狭帯域光観察", "⑳": "97"}}, {"id": "t-2-12", "text": "拡大内視鏡で観察される上皮乳頭内毛細血管【 ㉑ 】の形態変化（拡張、蛇行、口径不同、形状不均一）は、深達度診断に有用である。", "blanks": {"㉑": "IPCL"}}, {"id": "t-2-13", "text": "**バレット（Barrett）食道**は、食道下部の扁平上皮が【 ㉒ 】に置換された状態であり、【 ㉓ 】の発生母地となる。", "blanks": {"㉒": "円柱上皮", "㉓": "食道腺癌"}}, {"id": "t-2-14", "text": "食道癌の外科的手術において、再建経路のうち最も距離が短いのは【 ㉔ 】経路である。", "blanks": {"㉔": "後縦隔"}}, {"id": "t-2-15", "text": "手術の合併症として、リンパ節郭清に伴う【 ㉕ 】麻痺による嗄声（声がれ）が挙げられる。", "blanks": {"㉕": "反回神経"}}]}, {"title": "胃・十二指腸ブロック", "short": "胃・十二指腸", "icon": "🚨", "questions": [{"id": "t-3-1", "text": "消化性潰瘍の好発部位は、胃では【 ① 】、十二指腸では【 ② 】である。", "blanks": {"①": "胃角部小彎", "②": "球部前壁"}}, {"id": "t-3-2", "text": "潰瘍の攻撃因子には、胃酸、ペプシン、ヘリコバクター・ピロリ、【 ③ 】などがあり、防御因子には粘膜血流や【 ④ 】がある。", "blanks": {"③": "NSAIDs", "④": "プロスタグランジン"}}, {"id": "t-3-3", "text": "内視鏡的な潰瘍のステージ分類（崎田・三輪の分類）では、白苔を認める【 ⑤ 】期、再生上皮が出現する【 ⑥ 】期、白苔が消失した【 ⑦ 】期に分けられる。", "blanks": {"⑤": "A（Active）", "⑥": "H（Healing）", "⑦": "S（Scar）"}}, {"id": "t-3-4", "text": "ヘリコバクター・ピロリ（H. pylori）の診断において、【 ⑧ 】や迅速ウレアーゼ試験は菌が持つ【 ⑨ 】活性を利用している。", "blanks": {"⑧": "尿素呼気試験", "⑨": "ウレアーゼ"}}, {"id": "t-3-5", "text": "胃アニサキス症の治療は、内視鏡による【 ⑩ 】である。", "blanks": {"⑩": "虫体摘出"}}, {"id": "t-3-6", "text": "【 ⑪ 】症候群は、膵などの【 ⑫ 】からガストリンが過剰分泌され、難治性潰瘍を来す疾患である。", "blanks": {"⑪": "ゾリンジャー・エリソン（Zollinger-Ellison）", "⑫": "非β細胞腫瘍（ガストリノーマ）"}}, {"id": "t-3-7", "text": "早期胃癌の定義は、リンパ節転移の有無に関わらず、癌の浸潤が【 ⑬ 】までにとどまるものである。", "blanks": {"⑬": "粘膜下層（SM）"}}, {"id": "t-3-8", "text": "早期胃癌の肉眼分類で最も頻度が高いのは【 ⑭ 】型（表面陥凹型）である。", "blanks": {"⑭": "0-IIc"}}, {"id": "t-3-9", "text": "進行胃癌の肉眼分類（Borrmann分類）において、潰瘍を形成し周囲への浸潤が目立つものは【 ⑮ 】型である。", "blanks": {"⑮": "3"}}, {"id": "t-3-10", "text": "胃癌の組織型は、大きく【 ⑯ 】癌と【 ⑰ 】癌に分けられる。", "blanks": {"⑯": "分化型", "⑰": "未分化型"}}, {"id": "t-3-11", "text": "胃生検の組織診断（Group分類）において、癌と判定されるのは【 ⑱ 】である。", "blanks": {"⑱": "Group 5"}}, {"id": "t-3-12", "text": "内視鏡検査において、癌の範囲診断（側方進展度）には【 ⑲ 】散布が有用である。", "blanks": {"⑲": "インジゴカルミン"}}, {"id": "t-3-13", "text": "早期胃癌に対する内視鏡的治療の絶対適応の原則は、リンパ節転移の可能性が極めて低く、腫瘍が【 ㉓ 】できることである。", "blanks": {"㉓": "一括切除"}}, {"id": "t-3-14", "text": "【 ㉔ 】は、粘膜下層に薬剤を注入して病変を浮かせて切除する手法である。", "blanks": {"㉔": "ESD（内視鏡的粘膜下層剥離術）"}}, {"id": "t-3-15", "text": "内視鏡的治療の適応判定において、UL【 ㉕ 】の有無は重要な因子となる。", "blanks": {"㉕": "潰瘍"}}, {"id": "t-3-16", "text": "外科的手術（定型手術）では、胃の【 ㉖ 】以上の切除と所属リンパ節の郭清が行われる。", "blanks": {"㉖": "2/3"}}, {"id": "t-3-17", "text": "【 ㉗ 】の治療は、H. pylori陽性例であれば【 ㉘ 】が第一選択となる。", "blanks": {"㉗": "胃MALTリンパ腫", "㉘": "除菌療法"}}, {"id": "t-3-18", "text": "胃粘膜下腫瘍（SMT）のうち、c-kit陽性の【 ㉙ 】には、分子標的薬の【 ㉚ 】が有効である。", "blanks": {"㉙": "GIST", "㉚": "イマチニブ（グリベック）"}}, {"id": "t-3-19", "text": "GISTなどの粘膜下腫瘍の内視鏡的特徴として、周囲の粘膜が腫瘍に引っ張られて形成される【 ㉛ 】が挙げられる。", "blanks": {"㉛": "bridging fold"}}, {"id": "t-3-20", "text": "胃神経内分泌腫瘍（NET）のうち、【 ㉜ 】に伴うものはRindi分類1型に分類される。", "blanks": {"㉜": "自己免疫性胃炎（A型胃炎）"}}]}, {"title": "上部消化管出血", "short": "上部救急", "icon": "⚖️", "questions": [{"id": "t-4-1", "text": "上部消化管出血とは、【 ① 】よりも口側からの出血を指す。", "blanks": {"①": "Treitz（トライス）靭帯"}}, {"id": "t-4-2", "text": "大量出血により【 ② 】を来している場合、検査よりも先にバイタルサインの確認、および【 ③ 】を最優先で行う。", "blanks": {"②": "出血性ショック", "③": "血管確保・輸液"}}, {"id": "t-4-3", "text": "出血性ショックの臨床的兆候（ショックの5P）は、蒼白、虚脱、冷汗、脈拍触知困難、および【 ④ 】である。この際、脈拍は【 ⑤ 】を呈する。", "blanks": {"④": "呼吸困難（促迫）", "⑤": "頻脈"}}, {"id": "t-4-4", "text": "上部消化管出血の血液検査所見では、血液中の蛋白質が腸内細菌で分解・吸収されるため、【 ⑥ 】が上昇し、BUN/Cre比が高値となる特徴がある。", "blanks": {"⑥": "BUN（尿素窒素）"}}, {"id": "t-4-5", "text": "【 ⑦ 】は、食道、胃、十二指腸からの出血が嘔吐されるもので、胃酸に曝される時間が長いと【 ⑧ 】の茶褐色を呈する。", "blanks": {"⑦": "吐血", "⑧": "コーヒー残渣様"}}, {"id": "t-4-6", "text": "【 ⑨ 】は、上部消化管出血を示唆する重要な所見である。一方、【 ⑩ 】は一般に下部消化管（左結腸、直腸、肛門）からの出血を示唆するが、上部消化管からの大量出血でも腸管通過時間が短い場合は生じうる。", "blanks": {"⑨": "タール便（黒色便）", "⑩": "鮮紅血便"}}, {"id": "t-4-7", "text": "反復する激しい嘔吐の後に新鮮血を吐血する疾患は【 ⑪ 】であり、病変は【 ⑫ 】の直下の胃側に生じることが多い。", "blanks": {"⑪": "Mallory-Weiss（マロリー・ワイス）症候群", "⑫": "食道胃接合部"}}, {"id": "t-4-8", "text": "【 ⑬ 】は、イカやサバの生食数時間後に激しい腹痛を来す。出血よりも腹痛が主症状だが、内視鏡で【 ⑭ 】を行うことが診断・治療となる。", "blanks": {"⑬": "胃アニサキス症", "⑭": "虫体摘出"}}, {"id": "t-4-9", "text": "食道静脈瘤の主な供血路は【 ⑮ 】である。", "blanks": {"⑮": "左胃静脈"}}, {"id": "t-4-10", "text": "内視鏡所見において、静脈瘤表面の赤い点や斑点は【 ⑯ 】と呼ばれ、出血の危険性が高い兆候（risky sign）とされる。", "blanks": {"⑯": "RC（red color）サイン"}}, {"id": "t-4-11", "text": "静脈瘤破裂後の内視鏡像で、一時的に止血された部位に見られる白い付着物は【 ⑰ 】である。", "blanks": {"⑰": "白色栓（white plaque）"}}, {"id": "t-4-12", "text": "静脈瘤の治療法のうち、【 ⑱ 】は供血路まで硬化剤を注入する手法であり、再発率は低いが、高度肝機能障害がある場合は【 ⑲ 】となる。", "blanks": {"⑱": "EIS（内視鏡的硬化療法）", "⑲": "禁忌"}}, {"id": "t-4-13", "text": "一方、【 ⑳ 】はゴムバンドで結紮する簡便な手法であり、高度肝機能障害例でも施行可能だが、EISに比べて【 ㉑ 】が高い。", "blanks": {"⑳": "EVL（内視鏡的静脈瘤結紮術）", "㉑": "再発率"}}, {"id": "t-4-14", "text": "孤立性胃静脈瘤の治療には、カテーテルを用いて逆行性に硬化剤を注入する【 ㉒ 】などが検討される。", "blanks": {"㉒": "BRTO（バルーン下逆行性経静脈的塞栓術）"}}, {"id": "t-4-15", "text": "出血性消化性潰瘍の止血において、露出血管を直接挟んで止血する手法は【 ㉓ 】である。", "blanks": {"㉓": "クリップ法"}}, {"id": "t-4-16", "text": "薬剤を用いる手法として、【 ㉔ 】局注法があり、強力な脱水・凝固作用により血管を閉塞させる。", "blanks": {"㉔": "純エタノール"}}, {"id": "t-4-17", "text": "胃前庭部毛細血管拡張症（GAVE）から湧出性出血（oozing）を認める場合、【 ㉕ 】による組織の浅く均一な焼灼が有効である。", "blanks": {"㉕": "APC（アルゴンプラズマ凝固）"}}]}, {"title": "上部消化管 合併症", "short": "上部救急", "icon": "🟢", "questions": [{"id": "t-5-1", "text": "**ダンピング症候群**のうち、食後30分以内に生じる早期型は、高浸透圧の食物が腸管へ急激に流入することで起こるが、食後2〜3時間で生じる後期型は、過剰な【 ① 】分泌による【 ② 】状態が原因である。", "blanks": {"①": "インスリン", "②": "低血糖"}}, {"id": "t-5-2", "text": "胃切除後の貧血において、鉄欠乏性貧血は【 ③ 】貧血を呈するが、胃全摘後のビタミンB12吸収障害（内因子欠乏）による貧血は【 ④ 】貧血を呈する。", "blanks": {"③": "小球性低色素性", "④": "大球性正色素性 / 巨赤芽球性"}}, {"id": "t-5-3", "text": "ビタミンB12は体内の蓄積量が多いため、胃全摘後に欠乏による貧血が出現するまでには【 ⑤ 】年程度の期間を要する。", "blanks": {"⑤": "5〜7"}}, {"id": "t-5-4", "text": "胃全摘後の逆流性食道炎は胃酸ではなく【 ⑥ 】や膵液の逆流が原因であり、治療には【 ⑦ 】が用いられることがある。", "blanks": {"⑥": "胆汁", "⑦": "蛋白分解酵素阻害剤"}}, {"id": "t-5-5", "text": "胃切除後の遠隔期合併症として、【 ⑧ 】が約25%の症例で発生する。", "blanks": {"⑧": "胆嚢結石"}}, {"id": "t-5-6", "text": "食道癌手術におけるリンパ節郭清に伴い【 ⑨ 】麻痺が生じると、【 ⑩ 】や誤嚥（ごえん）の原因となる。この麻痺の多くは一過性であり、数ヶ月で回復する。", "blanks": {"⑨": "反回神経", "⑩": "嗄声 / 声がれ"}}, {"id": "t-5-7", "text": "再建臓器（胃管など）の血流障害や吻合部の緊張により生じる【 ⑪ 】は、頸部吻合では保存的に治癒しやすいが、【 ⑫ 】経路で発生すると縦隔炎を併発し致命的になることがある。", "blanks": {"⑪": "縫合不全", "⑫": "後縦隔"}}, {"id": "t-5-8", "text": "術中に胸管を損傷することで、胸腔内にリンパ液が貯留する【 ⑬ 】を来すことがある。", "blanks": {"⑬": "乳び胸"}}, {"id": "t-5-9", "text": "食道癌手術後の再建において、最も距離が短く安全とされる経路は【 ⑭ 】経路である。", "blanks": {"⑭": "後縦隔"}}, {"id": "t-5-10", "text": "胃ESDの偶発症として最も頻度が高いのは【 ⑮ 】であり、約4.1〜8.5%で発生する。", "blanks": {"⑮": "後出血"}}, {"id": "t-5-11", "text": "ESD中に【 ⑯ 】が発生した場合、多くは内視鏡的に【 ⑰ 】で閉鎖する内科的処置で対応可能である。", "blanks": {"⑯": "穿孔", "⑰": "クリップ"}}, {"id": "t-5-12", "text": "食道ESDにおいて、切除範囲が【 ⑱ 】に及ぶと、治癒過程で【 ⑲ 】を来すリスクが極めて高い。この予防や治療には、ステロイド局注や【 ⑳ 】が行われる。", "blanks": {"⑱": "全周性", "⑲": "狭窄", "⑳": "バルーン拡張"}}, {"id": "t-5-13", "text": "大量出血による【 ㉑ 】の徴候として、血圧低下とともに【 ㉒ 】を認める（「徐脈」は誤り）。", "blanks": {"㉑": "出血性ショック", "㉒": "頻脈"}}, {"id": "t-5-14", "text": "十二指腸潰瘍穿孔による腹膜炎の診断において、立位X線写真での【 ㉓ 】の確認は重要だが、穿孔部位確認のための【 ㉔ 】造影は禁忌である。", "blanks": {"㉓": "free air / 遊離ガス", "㉔": "バリウム"}}, {"id": "t-5-15", "text": "食道静脈瘤の治療法である【 ㉕ 】は、地固め療法として再発率が低いが、高度肝機能障害（Child-Pugh Cなど）がある場合は【 ㉖ 】となる。", "blanks": {"㉕": "EIS / 内視鏡的硬化療法", "㉖": "禁忌"}}]}, {"title": "上部消化管治療", "short": "上部救急", "icon": "🔵", "questions": [{"id": "t-6-1", "text": "**食道アカラシア**に対し、内視鏡下で下部食道括約筋の環状筋を切開する低侵襲治療は【 ① 】である。外科的手術では、筋層切開術に Dor 噴門形成術を併用する【 ② 】法が標準的である。", "blanks": {"①": "POEM / 経口内視鏡的筋層切開術", "②": "Heller-Dor / ヘラー・ドール"}}, {"id": "t-6-2", "text": "**胃食道逆流症（GERD）**の外科的治療（逆流防止術）の代表は、【 ③ 】法である。これは侵襲が少なく高齢者でも施行可能である。", "blanks": {"③": "Nissen / ニッセン"}}, {"id": "t-6-3", "text": "**食道癌**の内視鏡治療において、【 ④ 】散布を行うと正常粘膜は茶褐色に染まり、癌部は【 ⑤ 】として認識される。", "blanks": {"④": "ヨード", "⑤": "不染域 / 染まらない"}}, {"id": "t-6-4", "text": "食道癌の外科的手術における再建経路のうち、最も距離が短く安全とされるのは【 ⑥ 】経路である。一方、最も距離が長いのは前胸骨経路である。", "blanks": {"⑥": "後縦隔"}}, {"id": "t-6-5", "text": "食道癌手術のリンパ節郭清に伴い【 ⑦ 】麻痺が生じると、【 ⑧ 】や誤嚥を来すが、多くは数ヶ月で治癒する。", "blanks": {"⑦": "反回神経", "⑧": "嗄声 / 声がれ"}}, {"id": "t-6-6", "text": "**ヘリコバクター・ピロリ（H. pylori）**の一次除菌に用いられる薬剤は、アモキシシリン、クラリスロマイシン、および【 ⑨ 】の3剤である。一次除菌に失敗した際の二次除菌では、クラリスロマイシンの代わりに【 ⑩ 】が用いられる。", "blanks": {"⑨": "PPI または P-CAB", "⑩": "メトロニダゾール"}}, {"id": "t-6-7", "text": "**十二指腸潰瘍穿孔**の診断には、腹部CTや立位X線での【 ⑪ 】の確認が有用だが、穿孔部位確認のための【 ⑫ 】造影は腹膜炎を悪化させるため禁忌である。", "blanks": {"⑪": "free air / 遊離ガス", "⑫": "バリウム"}}, {"id": "t-6-8", "text": "胃アニサキス症の治療は、内視鏡による【 ⑬ 】が第一選択である。", "blanks": {"⑬": "虫体摘出"}}, {"id": "t-6-9", "text": "**ゾリンジャー・エリソン（Zollinger-Ellison）症候群**におけるガストリノーマの術式選択には、【 ⑭ 】が有用である。", "blanks": {"⑭": "SASI test"}}, {"id": "t-6-10", "text": "**早期胃癌**に対する【 ⑮ 】は、粘膜下層に薬剤を注入して病変を浮かせて切除する手法である。分化型早期胃癌において、潰瘍（UL）がない場合はサイズに関わらず適応となるが、ULがある場合は【 ⑯ 】cm以下が適応となる。", "blanks": {"⑮": "ESD / 内視鏡的粘膜下層剥離術", "⑯": "3"}}, {"id": "t-6-11", "text": "胃癌の外科的定型手術では、胃の【 ⑰ 】以上の切除とD2郭清が行われる。", "blanks": {"⑰": "2/3"}}, {"id": "t-6-12", "text": "**幽門側胃切除術**後の再建法のうち、残胃と十二指腸を直接吻合する手法を【 ⑱ 】法、残胃と空腸を吻合する手法を【 ⑲ 】法または【 ⑳ 】法と呼ぶ。", "blanks": {"⑱": "ビルロート / Billroth I", "⑲": "ビルロート / Billroth II", "⑳": "Roux-en-Y / ルーワイ"}}, {"id": "t-6-13", "text": "胃癌の術後補助化学療法として、ステージIIでは【 ㉑ 】の1年間投与が標準的である。", "blanks": {"㉑": "S-1"}}, {"id": "t-6-14", "text": "**ダンピング症候群**のうち、食後2〜3時間で一過性の高血糖に反応した過剰な【 ㉒ 】分泌により【 ㉓ 】を来すものを後期（晩期）ダンピング症候群と呼ぶ。", "blanks": {"㉒": "インスリン", "㉓": "低血糖"}}, {"id": "t-6-15", "text": "胃全摘後は、【 ㉔ 】の吸収に必要な内因子が欠乏するため、【 ㉕ 】を来す。このため生涯にわたる製剤投与が必要となる。", "blanks": {"㉔": "ビタミンB12", "㉕": "大球性貧血 / 巨赤芽球性貧血"}}, {"id": "t-6-16", "text": "胃切除後の遠隔期合併症として、【 ㉖ 】が約25%の症例で発生する。", "blanks": {"㉖": "胆嚢結石"}}]}, {"title": "下部消化管（クローン病）ブロック", "short": "大腸癌", "icon": "🟤", "questions": [{"id": "t-7-1", "text": "クローン病は、わが国において近年【 ① 】傾向にあり、発症ピークは【 ② 】の若年者に多い。", "blanks": {"①": "増加", "②": "10歳代後半〜20歳代"}}, {"id": "t-7-2", "text": "男女比は約【 ③ 】で男性に多く、潰瘍性大腸炎（UC）よりも患者数は【 ④ 】。", "blanks": {"③": "2：1", "④": "少ない"}}, {"id": "t-7-3", "text": "病変の範囲は、口腔から肛門までの【 ⑤ 】に起こりうるが、特に【 ⑥ 】、大腸、肛門に好発する。", "blanks": {"⑤": "全消化管", "⑥": "回腸末端"}}, {"id": "t-7-4", "text": "炎症は、正常粘膜の中に病変が点在する【 ⑦ 】を呈するのが特徴である。", "blanks": {"⑦": "スキップレジョン / 飛び石状病変"}}, {"id": "t-7-5", "text": "主な症状は腹痛、下痢、体重減少、発熱である。UCと比較して【 ⑧ 】の頻度は低い。", "blanks": {"⑧": "血便"}}, {"id": "t-7-6", "text": "腸管外合併症として、【 ⑨ 】、関節炎、虹彩炎、口腔内アフタなどが知られている。", "blanks": {"⑨": "結節性紅斑"}}, {"id": "t-7-7", "text": "肛門病変として、難治性の【 ⑩ 】や肛門周囲膿瘍を合併しやすく、これが初発症状となることも多い。", "blanks": {"⑩": "痔瘻"}}, {"id": "t-7-8", "text": "内視鏡やバリウム造影での特徴的な肉眼所見は、【 ⑪ 】と、粘膜が網目状に盛り上がる【 ⑫ 】である。", "blanks": {"⑪": "縦走潰瘍", "⑫": "敷石像 / cobblestone appearance"}}, {"id": "t-7-9", "text": "胃では【 ⑬ 】、十二指腸では【 ⑭ 】を認めることがある。", "blanks": {"⑬": "竹の節状外観", "⑭": "ノッチ様陥凹"}}, {"id": "t-7-10", "text": "病理組織学的検査では、腸管の【 ⑮ 】の炎症と、【 ⑯ 】が診断の重要な決め手となる。", "blanks": {"⑮": "全層性", "⑯": "非乾酪性類上皮細胞肉芽腫"}}, {"id": "t-7-11", "text": "UCでみられる【 ⑰ 】や粘膜下層までの炎症とは明確に区別される。", "blanks": {"⑰": "陰窩膿瘍"}}, {"id": "t-7-12", "text": "確定診断には、主要所見の【 ⑱ 】を認めるか、あるいは肉芽腫に加えて特徴的な副所見（不整形潰瘍、肛門病変など）を認める必要がある。", "blanks": {"⑱": "縦走潰瘍 または 敷石像"}}, {"id": "t-7-13", "text": "活動期の寛解導入には、5-ASA製剤、ステロイド、抗TNFα抗体製剤などが用いられる。ステロイドは寛解【 ⑲ 】には適さない。", "blanks": {"⑲": "維持"}}, {"id": "t-7-14", "text": "【 ⑳ 】は、クローン病において安全で極めて有効な治療法であり、【 ㉑ 】が多用される。", "blanks": {"⑳": "栄養療法", "㉑": "成分栄養剤 / エレンタール"}}, {"id": "t-7-15", "text": "分子標的薬として、インフリキシマブ（レミケード）などの【 ㉒ 】や、ウステキヌマブ（ステラーラ）などの抗IL-12/23抗体が用いられる。", "blanks": {"㉒": "抗TNFα抗体"}}, {"id": "t-7-16", "text": "アザチオプリン（イムラン）を使用する際は、副作用（白血球減少など）の予測に【 ㉓ 】遺伝子多型の確認が有用である。", "blanks": {"㉓": "NUDT15"}}, {"id": "t-7-17", "text": "外科手術の絶対適応は【 ㉔ 】であり、相対適応には、内科治療に抵抗する【 ㉕ 】、瘻孔、膿瘍、大量出血がある。", "blanks": {"㉔": "穿孔", "㉕": "狭窄"}}, {"id": "t-7-18", "text": "手術の基本方針は、将来的な【 ㉖ 】を避けるため、可能な限り腸管を【 ㉗ 】することである。", "blanks": {"㉖": "短腸症候群", "㉗": "温存"}}, {"id": "t-7-19", "text": "限局した線維性狭窄に対しては、腸管を切除せずに内腔を広げる【 ㉘ 】が行われる。", "blanks": {"㉘": "狭窄形成術 / Heineke-Mikulicz法など"}}, {"id": "t-7-20", "text": "肛門部病変（痔瘻）に対しては、ゴムを通す【 ㉙ 】による排膿処置が行われる。", "blanks": {"㉙": "シートン / seton 手術"}}]}, {"title": "潰瘍性大腸炎（UC）", "short": "IBD", "icon": "🟣", "questions": [{"id": "t-8-1", "text": "潰瘍性大腸炎（UC）の推定患者数は国内で約20万人に達しており、クローン病（CD）よりも【 ① 】。", "blanks": {"①": "多い"}}, {"id": "t-8-2", "text": "発症年齢のピークは【 ② 】歳代であるが、高齢者の新規発症も珍しくない。男女比は約【 ③ 】で性差はほとんど認められない。", "blanks": {"②": "20〜30", "③": "1：1"}}, {"id": "t-8-3", "text": "炎症は、原則として【 ④ 】から【 ⑤ 】に口側の大腸へと進展するのが特徴である。", "blanks": {"④": "直腸", "⑤": "連続性"}}, {"id": "t-8-4", "text": "炎症が及ぶ範囲は腸管の【 ⑥ 】にとどまり、クローン病のような全層性の炎症は通常見られない。", "blanks": {"⑥": "粘膜・粘膜下層"}}, {"id": "t-8-5", "text": "軽症例を除き、【 ⑦ 】は必発であり、診断の重要なキーワードである。", "blanks": {"⑦": "血便（粘血便）"}}, {"id": "t-8-6", "text": "大腸以外の合併症（腸管外合併症）として、皮膚の【 ⑧ 】や壊疽性膿皮症、眼の【 ⑨ 】、および肝・胆道系の【 ⑩ 】などが知られている。", "blanks": {"⑧": "結節性紅斑", "⑨": "虹彩炎", "⑩": "原発性硬化性胆管炎（PSC）"}}, {"id": "t-8-7", "text": "発症から【 ⑪ 】年以上経過した長期経過症例では、【 ⑫ 】の発生リスクが高まるため、定期的な監視内視鏡検査が必要である。", "blanks": {"⑪": "10", "⑫": "大腸癌"}}, {"id": "t-8-8", "text": "内視鏡検査において、活動期には【 ⑬ 】、粘膜の粗造・【 ⑭ 】変化、接触出血、多発性のびらん・潰瘍などが認められる。", "blanks": {"⑬": "血管透見像の消失", "⑭": "細顆粒状"}}, {"id": "t-8-9", "text": "内視鏡的活動性の評価には【 ⑮ 】が用いられ、MES 0〜1が内視鏡的寛解の目安とされる。", "blanks": {"⑮": "Mayo Endoscopic Subscore（MES）"}}, {"id": "t-8-10", "text": "注腸X線検査では、炎症により腸管の【 ⑯ 】が消失し、【 ⑰ 】と呼ばれる特徴的な像を呈する。また、潰瘍の跡として【 ⑱ 】を認めることもある。", "blanks": {"⑯": "ハウストラ（結腸膨起）", "⑰": "鉛管状", "⑱": "偽ポリポーシス"}}, {"id": "t-8-11", "text": "顕微鏡的特徴として、腺窩（陰窩）内に好中球が貯留する【 ⑲ 】や、杯細胞の減少、びまん性の炎症細胞浸潤が認められる。", "blanks": {"⑲": "陰窩膿瘍（crypt abscess）"}}, {"id": "t-8-12", "text": "クローン病で特徴的な【 ⑳ 】は認められない。", "blanks": {"⑳": "非乾酪性類上皮細胞肉芽腫"}}, {"id": "t-8-13", "text": "治療の主役は【 ㉑ 】製剤であり、寛解導入と【 ㉒ 】の両方に用いられる。", "blanks": {"㉑": "5-ASA（5-アミノサリチル酸）", "㉒": "寛解維持"}}, {"id": "t-8-14", "text": "【 ㉓ 】は強力な寛解導入効果を持つが、副作用の観点から【 ㉔ 】には適さない。", "blanks": {"㉓": "ステロイド", "㉔": "寛解維持"}}, {"id": "t-8-15", "text": "免疫調節薬であるアザチオプリン（イムラン）などの副作用（白血球減少など）を予測するために、【 ㉕ 】遺伝子多型の確認が有用である。", "blanks": {"㉕": "NUDT15"}}, {"id": "t-8-16", "text": "内科的治療に抵抗する難治例や、中毒性巨大結腸症などの緊急例では、外科的な【 ㉖ 】の適応となる。", "blanks": {"㉖": "大腸全摘術"}}]}, {"title": "急性虫垂炎", "short": "急性虫垂", "icon": "🟠", "questions": [{"id": "t-9-1", "text": "内腔閉塞の主な原因は【 ① 】であり、次いで【 ② 】が多い。まれに腫瘍や異物も原因となる。", "blanks": {"①": "糞石", "②": "リンパ濾胞過形成"}}, {"id": "t-9-2", "text": "閉塞により虫垂内圧が上昇すると、うっ血や浮腫が生じ、さらに進行すると【 ③ 】に至る。", "blanks": {"③": "壊疽・穿孔"}}, {"id": "t-9-3", "text": "腹痛の典型的な推移は、初期の【 ④ 】から、次第に【 ⑤ 】へと移動する（移動性腹痛）。", "blanks": {"④": "心窩部痛 / 臍周囲痛", "⑤": "右下腹部痛"}}, {"id": "t-9-4", "text": "代表的な圧痛点として、右前上腸骨棘と臍を結ぶ線上にある【 ⑥ 】点や、左右の前上腸骨棘を結ぶ線上の右1/3にある【 ⑦ 】点がある。", "blanks": {"⑥": "McBurney（マックバーニー）", "⑦": "Lanz（ランツ）"}}, {"id": "t-9-5", "text": "腹膜刺激症状を示す重要な徴候として、圧痛部を深く押さえて急に手を離した時に痛みが響く【 ⑧ 】徴候や、腹壁が硬くなる【 ⑨ 】が挙げられる。", "blanks": {"⑧": "Blumberg（ブルンベルグ）", "⑨": "筋性防御"}}, {"id": "t-9-6", "text": "**腹部CT検査**では、【 ⑩ 】や【 ⑪ 】、【 ⑫ 】が特徴的な所見である。", "blanks": {"⑩": "虫体（虫垂）の腫大", "⑪": "糞石の嵌頓", "⑫": "腸管外の脂肪組織濃度上昇（fat stranding）"}}, {"id": "t-9-7", "text": "**腹部超音波検査**は、【 ⑬ 】であるため、特に小児や【 ⑭ 】の診断に適用しやすい利点がある。", "blanks": {"⑬": "非侵襲的", "⑭": "妊婦"}}, {"id": "t-9-8", "text": "血液生化学検査では、【 ⑮ 】の上昇や【 ⑯ 】の上昇といった炎症反応を認める。", "blanks": {"⑮": "白血球数", "⑯": "CRP"}}, {"id": "t-9-9", "text": "炎症の程度による分類では、軽い順に【 ⑰ 】→【 ⑱ 】→【 ⑲ 】と進展する。蜂窩織炎性以上を複雑性（壊疽性）と呼ぶこともある。", "blanks": {"⑰": "カタル性", "⑱": "蜂窩織炎性", "⑲": "壊疽性"}}, {"id": "t-9-10", "text": "保存的治療では、絶飲食、【 ⑳ 】の投与、必要に応じて膿瘍ドレナージを行う。", "blanks": {"⑳": "抗菌薬（抗生剤）"}}, {"id": "t-9-11", "text": "手術治療では虫垂切除術が行われる。炎症が強く周囲に波及している場合は【 ㉑ 】が必要になることもある。", "blanks": {"㉑": "回盲部切除術"}}, {"id": "t-9-12", "text": "炎症が一旦沈静化した後に、待機的に手術を行う手法を【 ㉒ 】と呼ぶ。", "blanks": {"㉒": "Interval appendectomy"}}, {"id": "t-9-13", "text": "【 ㉓ 】では発症頻度が高く、かつ【 ㉔ 】が高い傾向にあるため注意を要する。", "blanks": {"㉓": "小児", "㉔": "穿孔率"}}, {"id": "t-9-14", "text": "【 ㉕ 】では、子宮の増大に伴い虫垂の位置が【 ㉖ 】に偏位するため、痛みの部位が典型的ではなくなる。", "blanks": {"㉕": "妊婦", "㉖": "上方（頭側）"}}, {"id": "t-9-15", "text": "【 ㉗ 】では、重症化していても症状がはっきりしないことがあり、【 ㉘ 】が見られないこともあるため、腫瘍性病変との鑑別を含めた慎重な診断が必要である。", "blanks": {"㉗": "高齢者", "㉘": "白血球増多"}}]}, {"title": "肛門疾患", "short": "肛門疾患", "icon": "⚪", "questions": [{"id": "t-10-1", "text": "組織学的な境界である【 ① 】より上（頭側）は【 ② 】で内胚葉由来、下（肛門側）は【 ③ 】で外胚葉由来である。", "blanks": {"①": "歯状線", "②": "円柱上皮", "③": "扁平上皮"}}, {"id": "t-10-2", "text": "内肛門括約筋は【 ④ 】であり、【 ⑤ 】として無意識のうちに便やガスの漏れを防いでいる。", "blanks": {"④": "平滑筋", "⑤": "不随意筋"}}, {"id": "t-10-3", "text": "外肛門括約筋は【 ⑥ 】であり、【 ⑦ 】として便意を感じた時に意識的に排便を我慢する役割を持つ。", "blanks": {"⑥": "横紋筋", "⑦": "随意筋"}}, {"id": "t-10-4", "text": "外肛門括約筋が損傷されると、トイレまで我慢できない【 ⑧ 】を来す。", "blanks": {"⑧": "漏便"}}, {"id": "t-10-5", "text": "直腸診察において、【 ⑨ 】は直腸肛門部の診断に極めて重要である。", "blanks": {"⑨": "直腸指診（指検）"}}, {"id": "t-10-6", "text": "歯状線より口側の静脈叢から発生するものを【 ⑩ 】、肛門側に発生するものを【 ⑪ 】と呼ぶ。", "blanks": {"⑩": "内痔核", "⑪": "外痔核"}}, {"id": "t-10-7", "text": "内痔核の重症度判定には【 ⑫ 】が用いられ、排便時に脱出し、用手的に還納が必要な状態は【 ⑬ 】とされる。", "blanks": {"⑫": "Goligher（ゴリガー）分類", "⑬": "Ⅲ度"}}, {"id": "t-10-8", "text": "内痔核の切らずに治す治療法として、硫酸アルミニウムカリウム・タンニン酸【 ⑭ 】を用いた硬化療法がある。", "blanks": {"⑭": "ALTA / ジオン注"}}, {"id": "t-10-9", "text": "内痔核が括約筋によって絞扼され、血流障害による強い疼痛を来した状態を【 ⑮ 】と呼ぶ。", "blanks": {"⑮": "嵌頓（かんとん）痔核"}}, {"id": "t-10-10", "text": "【 ⑯ 】から侵入した細菌が肛門腺に感染し、膿が溜まった状態を肛門周囲膿瘍と呼び、これが自潰または切開排膿した後に形成される難治性の瘻孔を【 ⑰ 】と呼ぶ。", "blanks": {"⑯": "肛門陰窩", "⑰": "痔瘻"}}, {"id": "t-10-11", "text": "痔瘻の分類には【 ⑱ 】が用いられ、肛門挙筋を貫通して骨盤直腸窩に及ぶものはⅣ型（挙筋上痔瘻）に分類される。", "blanks": {"⑱": "隅越（すみこし）分類"}}, {"id": "t-10-12", "text": "【 ⑲ 】年以上経過した痔瘻からは、癌（特に粘液癌）が発生することがあるため注意を要する。", "blanks": {"⑲": "10"}}, {"id": "t-10-13", "text": "痔瘻に対し、瘻孔にゴムを通し長期間留置して排膿を図る手法を【 ⑳ 】と呼ぶ。", "blanks": {"⑳": "シートン（seton）法"}}, {"id": "t-10-14", "text": "裂肛（切れ痔）の好発部位は、時計の針でいう【 ㉑ 】方向（背側正中部）である。", "blanks": {"㉑": "6時"}}, {"id": "t-10-15", "text": "裂肛が慢性化すると、口側に肛門ポリープ、肛門側に【 ㉒ 】を形成することが特徴である。", "blanks": {"㉒": "見張りいぼ（skin tag）"}}, {"id": "t-10-16", "text": "糖尿病などのCompromised hostにおいて、会陰部から外性器にかけて急速に進行する壊死性筋膜炎を【 ㉓ 】と呼ぶ。", "blanks": {"㉓": "Fournier（フルニエ）症候群"}}, {"id": "t-10-17", "text": "クローン病では初発症状として肛門病変を認めることが【 ㉔ 】。", "blanks": {"㉔": "多い"}}, {"id": "t-10-18", "text": "クローン病の肛門病変の特徴として、多発性の痔瘻や、浮腫状の【 ㉕ 】、【 ㉖ 】などが挙げられる。", "blanks": {"㉕": "skin tag", "㉖": "肛門潰瘍"}}, {"id": "t-10-19", "text": "クローン病に伴う痔瘻に対するシートン法は、根治よりも膿を溜めない【 ㉗ 】としての意義が大きく、QOL維持のために長期間留置されることが多い。", "blanks": {"㉗": "排膿処置"}}]}, {"title": "下部消化管腫瘍", "short": "大腸癌", "icon": "🔶", "questions": [{"id": "t-11-1", "text": "日本人女性の部位別がん死亡原因において、大腸癌は第【 ① 】位である。", "blanks": {"①": "1"}}, {"id": "t-11-2", "text": "大腸癌の確定的危険因子として、【 ② 】や貯蔵肉・赤肉の摂取が挙げられる。", "blanks": {"②": "肥満 / 過体重"}}, {"id": "t-11-3", "text": "大腸癌検診では、死亡率減少効果が証明されている【 ③ 】が推奨される。", "blanks": {"③": "便潜血検査（免疫法）"}}, {"id": "t-11-4", "text": "大腸癌の発生部位として最も頻度が高いのは【 ④ 】であり、次いで【 ⑤ 】に多い。", "blanks": {"④": "直腸", "⑤": "S状結腸"}}, {"id": "t-11-5", "text": "早期大腸癌は、リンパ節転移の有無に関わらず、癌の浸潤が【 ⑥ 】（SM）までにとどまるものと定義される。", "blanks": {"⑥": "粘膜下層"}}, {"id": "t-11-6", "text": "進行大腸癌の肉眼分類において、最も頻度が高いのは【 ⑦ 】型（潰瘍限局型）である。", "blanks": {"⑦": "2"}}, {"id": "t-11-7", "text": "注腸X線検査において、全周性の狭窄により【 ⑧ 】（リンゴの芯）を認める場合は進行癌を疑う。", "blanks": {"⑧": "apple core sign"}}, {"id": "t-11-8", "text": "大腸癌の遠隔転移として最も頻度が高い臓器は、【 ⑨ 】（門脈経由）であり、次いで肺である。", "blanks": {"⑨": "肝臓"}}, {"id": "t-11-9", "text": "【 ⑩ 】分類において、リンパ節転移を認めるものは【 ⑪ 】と判定される。", "blanks": {"⑩": "Dukes（デュークス）", "⑪": "C"}}, {"id": "t-11-10", "text": "内視鏡検査において、癌の範囲や深達度を詳しく評価するために【 ⑫ 】や色素散布、拡大内視鏡が用いられる。", "blanks": {"⑫": "NBI（狭帯域光観察）"}}, {"id": "t-11-11", "text": "拡大内視鏡による【 ⑬ 】分類において、ⅤN型（無構造）は【 ⑭ 】を示唆し、外科手術の適応となる。", "blanks": {"⑬": "pit pattern（ピットパターン）", "⑭": "粘膜下層（SM）深部浸潤癌"}}, {"id": "t-11-12", "text": "【 ⑮ 】は一般に2cm未満の病変が対象となるが、2cm以上の大きな平坦型腫瘍や線維化した病変には【 ⑯ 】が行われる。", "blanks": {"⑮": "EMR（内視鏡的粘膜切除術）", "⑯": "ESD（内視鏡的粘膜下層剥離術）"}}, {"id": "t-11-13", "text": "**家族性大腸腺腫症（FAP）**は、5番染色体上の【 ⑰ 】遺伝子の変異による常染色体優性遺伝疾患であり、放置すればほぼ100％癌化する。", "blanks": {"⑰": "APC"}}, {"id": "t-11-14", "text": "FAPに骨腫や軟部組織腫瘍を合併するものを【 ⑱ 】症候群、中枢神経系腫瘍を合併するものを【 ⑲ 】症候群と呼ぶ。", "blanks": {"⑱": "Gardner（ガードナー）", "⑲": "Turcot（ターコット）"}}, {"id": "t-11-15", "text": "【 ⑳ 】症候群は、口唇や四肢末端の【 ㉑ 】と全消化管の過誤腫性ポリープを特徴とする。", "blanks": {"⑳": "Peutz-Jeghers（ポイツ・イェガース）", "㉑": "色素沈着"}}, {"id": "t-11-16", "text": "【 ㉒ 】症候群は、脱毛、爪甲萎縮、色素沈着を伴うが、【 ㉓ 】のポリポーシスである。", "blanks": {"㉒": "Cronkhite-Canada（クローンカイト・カナダ）", "㉓": "非遺伝性"}}, {"id": "t-11-17", "text": "Lynch（リンチ）症候群は、若年発症の大腸癌のほか、子宮内膜癌などの他臓器癌を合併しやすく、【 ㉔ 】が認められる。", "blanks": {"㉔": "マイクロサテライト不安定性（MSI）"}}, {"id": "t-11-18", "text": "直腸癌の手術において、肛門括約筋を温存し腹膜反転部より下で吻合する術式を【 ㉕ 】と呼ぶ。", "blanks": {"㉕": "低位前方切除術"}}, {"id": "t-11-19", "text": "直腸癌が肛門近くに及ぶ場合、肛門を閉鎖し永久的な人工肛門を作る【 ㉖ 】が行われる。", "blanks": {"㉖": "直腸切断術（Miles手術）"}}]}, {"title": "下部消化管治療", "short": "大腸癌", "icon": "🔬", "questions": [{"id": "t-12-1", "text": "**潰瘍性大腸炎（UC）**の外科手術において、標準的な自然肛門温存術式は【 ① 】術である。", "blanks": {"①": "大腸全摘・回腸嚢肛門（管）吻合"}}, {"id": "t-12-2", "text": "UCの絶対的手術適応には【 ② 】や中毒性巨大結腸症、大量出血、癌の合併が含まれる。", "blanks": {"②": "大腸穿孔"}}, {"id": "t-12-3", "text": "UCの術後合併症で最も頻度が高いのは【 ③ 】であり、治療には抗菌薬が有効である。", "blanks": {"③": "回腸嚢炎"}}, {"id": "t-12-4", "text": "**クローン病（CD）**の手術適応で最も多い原因は【 ④ 】である。", "blanks": {"④": "狭窄（腸閉塞）"}}, {"id": "t-12-5", "text": "CDの手術は、将来的な短腸症候群を避けるため【 ⑤ 】を基本とする。", "blanks": {"⑤": "最小限の切除 / 腸管温存"}}, {"id": "t-12-6", "text": "CDの限局した線維性狭窄に対して、腸管を切除せずに内腔を拡張する術式を【 ⑥ 】と呼び、その一術式として【 ⑦ 】法がある。", "blanks": {"⑥": "狭窄形成術", "⑦": "Heineke-Mikulicz（ヘラー・ミクリッツ）"}}, {"id": "t-12-7", "text": "CDの肛門病変（痔瘻）に対し、瘻孔にゴムを通して排膿を図る処置は【 ⑧ 】法である。", "blanks": {"⑧": "シートン（seton）"}}, {"id": "t-12-8", "text": "IBDの治療薬であるチオプリン製剤を開始する前には、副作用の白血球減少を予測するために【 ⑨ 】遺伝子検査が必須である。", "blanks": {"⑨": "NUDT15"}}, {"id": "t-12-9", "text": "大腸ポリープの切除において、スネアを用いる【 ⑩ 】は、一般に【 ⑪ 】cm未満の病変が適応となる。", "blanks": {"⑩": "EMR（内視鏡的粘膜切除術）", "⑪": "2"}}, {"id": "t-12-10", "text": "【 ⑫ 】は、専用のナイフで粘膜下層を直接剥離するため、2cmを超える病変でも【 ⑬ 】が可能である。", "blanks": {"⑫": "ESD（内視鏡的粘膜下層剥離術）", "⑬": "一括切除"}}, {"id": "t-12-11", "text": "ESDの主な適応病変は、【 ⑭ 】や線維化を伴う病変である。", "blanks": {"⑭": "LST（側方進展型腫瘍）"}}, {"id": "t-12-12", "text": "ESDはEMRと比較して、術中【 ⑮ 】などの偶発症のリスクが高い。", "blanks": {"⑮": "穿孔"}}, {"id": "t-12-13", "text": "直腸癌の手術において、肛門括約筋を温存し、吻合部が腹膜反転部より下になる術式を【 ⑯ 】術と呼ぶ。", "blanks": {"⑯": "低位前方切除"}}, {"id": "t-12-14", "text": "肛門に近い早期癌に対し、リンパ節郭清を行わず肛門からの操作のみで切除する手法を【 ⑰ 】という。", "blanks": {"⑰": "局所切除"}}, {"id": "t-12-15", "text": "肛門括約筋を温存できない場合、肛門を閉鎖し永久的な人工肛門を造設する【 ⑱ 】が行われる。", "blanks": {"⑱": "直腸切断術（Miles手術）"}}, {"id": "t-12-16", "text": "直腸癌手術において、排尿機能や性機能を維持するためには、下腹神経や【 ⑲ 】などの自律神経を温存することが重要である。", "blanks": {"⑲": "骨盤内臓神経"}}, {"id": "t-12-17", "text": "縫合不全や肛門機能不全が懸念される場合、一時的に【 ⑳ 】を造設することがある。", "blanks": {"⑳": "ストーマ（人工肛門）"}}, {"id": "t-12-18", "text": "【 ㉑ 】は術後3〜4日に発症することが多く、ドレーン排液の性状変化や発熱、腹痛を認める。画像検査で腸管外への【 ㉒ 】を確認することで診断される。", "blanks": {"㉑": "縫合不全", "㉒": "造影剤の漏出"}}, {"id": "t-12-19", "text": "術後の【 ㉓ 】では、腹部単純X線（立位）において腸液とガスの水平面である【 ㉔ 】が認められる。", "blanks": {"㉓": "腸閉塞（イレウス）", "㉔": "鏡面像（ニボー / niveau）"}}, {"id": "t-12-20", "text": "腸管の血流障害を伴う【 ㉕ 】は、腸管壊死からショック状態に陥る危険があり、緊急手術の適応となる。", "blanks": {"㉕": "絞扼性腸閉塞"}}]}, {"title": "肝疾患 ブロック網羅", "short": "肝(良性)", "icon": "📋", "questions": [{"id": "t-13-1", "text": "成人の肝臓の重量は体重の約【 ① 】で、1200〜1500gである。", "blanks": {"①": "1/50"}}, {"id": "t-13-2", "text": "正常な肝細胞への血流供給は、門脈が【 ② 】%、肝動脈が【 ③ 】%である。", "blanks": {"②": "70（約7割）", "③": "30（約3割）"}}, {"id": "t-13-3", "text": "肝臓はクイノー（Couinaud）分類によって【 ④ 】の8つの亜区域に分類される。", "blanks": {"④": "S1〜S8"}}, {"id": "t-13-4", "text": "初期の黄疸は【 ⑤ 】の黄染によって診断される。", "blanks": {"⑤": "眼球結膜"}}, {"id": "t-13-5", "text": "肝予備能を評価する【 ⑥ 】の5項目は、血清アルブミン、総ビリルビン、PT時間（または活性）、【 ⑦ 】、および肝性脳症である。なお、【 ⑧ 】や血清クレアチニン、アンモニアはこの分類に含まれない。", "blanks": {"⑥": "Child-Pugh（チャイルド・ピュー）分類", "⑦": "腹水", "⑧": "血小板数"}}, {"id": "t-13-6", "text": "肝細胞が破壊される際に逸脱する酵素のうち、AST(GOT)よりも【 ⑨ 】の方が肝細胞特異性が高い。", "blanks": {"⑨": "ALT(GPT)"}}, {"id": "t-13-7", "text": "肝臓の線維化（硬さ）の程度を最もよく反映する血液検査項目は【 ⑩ 】の減少である。", "blanks": {"⑩": "血小板数"}}, {"id": "t-13-8", "text": "ウィルソン（Wilson）病は、銅の代謝異常により【 ⑪ 】が肝臓や脳に蓄積する常染色体【 ⑫ 】遺伝疾患であり、眼科的所見として【 ⑬ 】が、血液検査では【 ⑭ 】の低下が特徴である。", "blanks": {"⑪": "銅", "⑫": "劣性", "⑬": "Kayser-Fleischer（カイザー・フライシャー）角膜輪", "⑭": "セルロプラスミン"}}, {"id": "t-13-9", "text": "アルコール性肝障害の診断において、アルコールの過剰摂取は【 ⑮ 】以上とされ、血液検査では【 ⑯ 】の上昇が特徴的である。", "blanks": {"⑮": "20g/日", "⑯": "IgA"}}, {"id": "t-13-10", "text": "【 ⑰ 】は、糖尿病や肥満の合併が多く、肝硬変や肝癌へと進行するリスクがある。治療の基本は【 ⑱ 】である。", "blanks": {"⑰": "非アルコール性脂肪肝炎（NASH）", "⑱": "食事運動療法"}}, {"id": "t-13-11", "text": "自己免疫性肝炎（AIH）は中年女性に好発し、血液検査で【 ⑲ 】陽性やIgG高値を示し、治療には【 ⑳ 】が著効する。", "blanks": {"⑲": "抗核抗体（ANA）", "⑳": "副腎皮質ステロイド"}}, {"id": "t-13-12", "text": "原発性胆汁性胆管炎（PBC）は中年女性に多く、【 ㉑ 】が陽性となる。治療薬として【 ㉒ 】が有効である。", "blanks": {"㉑": "抗ミトコンドリア抗体（AMA）", "㉒": "ウルソデオキシコール酸"}}, {"id": "t-13-13", "text": "急性肝不全（劇症肝炎）の診断基準は、初発症状から8週以内に昏睡度II度以上の肝性脳症を来し、プロトロンビン時間が【 ㉓ 】%以下となったものである。", "blanks": {"㉓": "40"}}, {"id": "t-13-14", "text": "肝性脳症による昏睡において、【 ㉔ 】はII度以上で見られる。", "blanks": {"㉔": "羽ばたき振戦"}}, {"id": "t-13-15", "text": "B型肝炎の長期治療目標は【 ㉕ 】の陰性化（functional cure）である。HBVは肝細胞核内に【 ㉖ 】として残存するため、ウイルス排除が困難である。", "blanks": {"㉕": "HBs抗原", "㉖": "cccDNA"}}, {"id": "t-13-16", "text": "免疫抑制剤や化学療法により、既往感染者（HBs抗原陰性、かつHBs抗体またはHBc抗体陽性）からHBVが再増殖することを【 ㉗ 】と呼ぶ。", "blanks": {"㉗": "de novo（デノボ）B型肝炎"}}, {"id": "t-13-17", "text": "C型肝炎は現在、直接作用型抗ウイルス薬【 ㉘ 】の投与により、90%以上の確率でウイルス排除（SVR）が可能である。ただし、ウイルスを排除しても発癌リスクは【 ㉙ 】ため、継続的なフォローが必要である。", "blanks": {"㉘": "DAA", "㉙": "ゼロにはならない"}}, {"id": "t-13-18", "text": "肝細胞癌の主要な腫瘍マーカーは、【 ㉚ 】と【 ㉛ 】である。", "blanks": {"㉚": "AFP", "㉛": "PIVKA-II"}}, {"id": "t-13-19", "text": "腹部超音波検査（エコー）におけるHCCの典型所見は、腫瘍周囲の低エコー帯である【 ㉜ 】や、内部の不均一な構造を示す【 ㉝ 】である。", "blanks": {"㉜": "halo（ハロー）", "㉝": "mosaic pattern（モザイクパターン）"}}, {"id": "t-13-20", "text": "ダイナミック造影CT/MRIにおいて、HCCは動脈相で【 ㉞ 】され、門脈相・平衡相で【 ㉟ 】される。なお、リング状の濃染を呈するのは【 ㊱ 】の特徴である。", "blanks": {"㉞": "早期濃染（wash-in）", "㉟": "洗い出し（wash-out）", "㊱": "胆管細胞癌"}}, {"id": "t-13-21", "text": "【 ㊲ 】検査では、造影15〜20分後の肝細胞相において、癌部は正常肝細胞による造影剤の取り込みがないため【 ㊳ 】域として描出される。", "blanks": {"㊲": "EOB-MRI", "㊳": "低信号"}}, {"id": "t-13-22", "text": "肝切除の適応決定には、Child-Pugh分類や【 ㊴ 】（インドシアニングリーン試験）による肝予備能評価が必須である。", "blanks": {"㊴": "ICG R15"}}, {"id": "t-13-23", "text": "ラジオ波焼灼療法（RFA）の標準的な適応は、腫瘍径【 ㊵ 】cm以内、個数【 ㊶ 】個以内である。", "blanks": {"㊵": "3", "㊶": "3"}}, {"id": "t-13-24", "text": "肝動脈化学塞栓療法（TACE）は、カテーテルを用いて【 ㊷ 】から抗癌剤と塞栓物質を注入する手法である。", "blanks": {"㊷": "肝動脈"}}, {"id": "t-13-25", "text": "HCCの一次薬物療法（first line）として、現在は【 ㊸ 】などの併用療法が推奨されている。", "blanks": {"㊸": "アテゾリズマブ＋ベバシズマブ"}}, {"id": "t-13-26", "text": "肝移植の適応基準として、単発5cm以内または3個以内かつ各3cm以内という【 ㊹ 】が知られている。", "blanks": {"㊹": "ミラノ基準"}}]}, {"title": "肝疾患の診断と治療", "short": "肝(良性)", "icon": "🏥", "questions": [{"id": "t-14-1", "text": "正常な肝細胞への血流供給は、門脈が約【 ① 】％、肝動脈が約【 ③ 】％である。", "blanks": {"①": "70", "③": "30"}}, {"id": "t-14-2", "text": "正常な成人の肝臓の重量は体重の約【 ③ 】程度で、1200〜1500gである。", "blanks": {"③": "1/50"}}, {"id": "t-14-3", "text": "肝臓はクイノー分類によって【 ④ 】の8つの亜区域に分類される。", "blanks": {"④": "S1〜S8"}}, {"id": "t-14-4", "text": "初期の黄疸は【 ⑤ 】の黄染によって診断される。", "blanks": {"⑤": "眼球結膜"}}, {"id": "t-14-5", "text": "肝予備能を評価する【 ⑥ 】の5項目は、血清アルブミン、総ビリルビン、PT時間（または活性）、【 ⑦ 】、および肝性脳症である。", "blanks": {"⑥": "Child-Pugh（チャイルド・ピュー）分類", "⑦": "腹水"}}, {"id": "t-14-6", "text": "肝予備能評価において、血小板数や【 ⑧ 】はChild-Pugh分類には含まれない。", "blanks": {"⑧": "血清クレアチニン"}}, {"id": "t-14-7", "text": "肝細胞癌の外科的切除の術式決定において、腫瘍の個数だけでなく【 ⑨ 】（インドシアニングリーン試験）値が極めて重要である。", "blanks": {"⑨": "ICG R15"}}, {"id": "t-14-8", "text": "急性肝不全（劇症肝炎）の診断基準は、初発症状から8週以内に昏睡度II度以上の肝性脳症を来し、プロトロンビン時間が【 ⑩ 】％以下となったものである。", "blanks": {"⑩": "40"}}, {"id": "t-14-9", "text": "肝性脳症による昏睡において、【 ⑪ 】はII度以上で見られる。", "blanks": {"⑪": "羽ばたき振戦"}}, {"id": "t-14-10", "text": "B型肝炎治療の長期目標は【 ⑫ 】の陰性化（functional cure）である。", "blanks": {"⑫": "HBs抗原"}}, {"id": "t-14-11", "text": "B型肝炎ウイルスは肝細胞核内に【 ⑬ 】として残存するため、ウイルス排除が困難である。", "blanks": {"⑬": "cccDNA"}}, {"id": "t-14-12", "text": "C型肝炎は現在、直接作用型抗ウイルス薬【 ⑭ 】の投与により95％以上の確率でウイルス排除（SVR）が可能であるが、排除後も発癌リスクは【 ⑮ 】ため定期的な経過観察が必要である。", "blanks": {"⑭": "DAA", "⑮": "ゼロにはならない"}}, {"id": "t-14-13", "text": "ウィルソン（Wilson）病は、【 ⑯ 】遺伝子変異により【 ⑰ 】が肝臓や脳に蓄積する常染色体【 ⑱ 】遺伝疾患である。", "blanks": {"⑯": "ATP7B", "⑰": "銅", "⑱": "劣性"}}, {"id": "t-14-14", "text": "Wilson病の眼科的所見として【 ⑲ 】が、血液検査では【 ⑳ 】の低下が特徴である。", "blanks": {"⑲": "Kayser-Fleischer（カイザー・フライシャー）角膜輪", "⑳": "セルロプラスミン"}}, {"id": "t-14-15", "text": "自己免疫性肝炎（AIH）は中年女性に好発し、血液検査で【 ㉑ 】陽性やIgG高値を示し、治療には【 ㉒ 】が第一選択となる。", "blanks": {"㉑": "抗核抗体（ANA）", "㉒": "副腎皮質ステロイド"}}, {"id": "t-14-16", "text": "原発性胆汁性胆管炎（PBC）は中年女性に多く、【 ㉓ 】が陽性となり、【 ㉔ 】による進行抑制が有効である。", "blanks": {"㉓": "抗ミトコンドリア抗体（AMA）", "㉔": "ウルソデオキシコール酸"}}, {"id": "t-14-17", "text": "原発性硬化性胆管炎（PSC）は、男性にやや多く、【 ㉕ 】の合併が約37％に認められる。", "blanks": {"㉕": "炎症性腸疾患（特に潰瘍性大腸炎）"}}, {"id": "t-14-18", "text": "非アルコール性脂肪性肝炎（NASH）の治療の基本は、【 ㉖ 】による包括的なリハビリテーションである。", "blanks": {"㉖": "食事運動療法"}}, {"id": "t-14-19", "text": "腹部超音波検査（エコー）におけるHCCの典型所見は、腫瘍周囲の低エコー帯である【 ㉗ 】や、内部の不均一な構造を示す【 ㉘ 】である。", "blanks": {"㉗": "halo（ハロー）", "㉘": "mosaic pattern（モザイクパターン）"}}, {"id": "t-14-20", "text": "ダイナミック造影CT/MRIにおいて、HCCは動脈相で【 ㉙ 】され、門脈相・平衡相で【 ㉚ 】される。", "blanks": {"㉙": "早期濃染（wash-in）", "㉚": "洗い出し（wash-out）"}}, {"id": "t-14-21", "text": "【 ㉛ 】検査では、造影15〜20分後の肝細胞相において、癌部は正常肝細胞による造影剤の取り込みがないため【 ㉜ 】域として描出される。", "blanks": {"㉛": "EOB-MRI", "㉜": "低信号"}}, {"id": "t-14-22", "text": "HCCの主要な腫瘍マーカーは、【 ㉝ 】と PIVKA-II である。", "blanks": {"㉝": "AFP"}}, {"id": "t-14-23", "text": "ラジオ波焼灼療法（RFA）の標準的な適応は、腫瘍径【 ㉞ 】cm以内、個数【 ㉟ 】個以内である。", "blanks": {"㉞": "3", "㉟": "3"}}, {"id": "t-14-24", "text": "肝切除が選択されるのは、主にChild-Pugh分類【 ㊱ 】かつ肝外転移・脈管侵襲がない場合である。", "blanks": {"㊱": "A または B"}}, {"id": "t-14-25", "text": "肝移植の適応基準として、単発5cm以内、または3個以内かつ各3cm以内という【 ㊲ 】が世界的に用いられる。", "blanks": {"㊲": "ミラノ基準"}}, {"id": "t-14-26", "text": "生体肝移植のドナーは、健康な成人であれば【 ㊳ 】であっても移植可能となっている。", "blanks": {"㊳": "血液型不適合"}}]}, {"title": "胆道疾患", "short": "胆道・脾臓", "icon": "💊", "questions": [{"id": "t-15-1", "text": "胆道とは、肝細胞から分泌された胆汁が十二指腸に流出するまでの全排泄経路を指し、胆管、胆嚢、【 ① 】が含まれる。", "blanks": {"①": "十二指腸乳頭部"}}, {"id": "t-15-2", "text": "外科手術（胆嚢摘出術など）において重要な指標となる【 ② 】は、胆嚢管、総肝管、【 ③ 】の3つで構成される。※資料により第3辺を胆嚢動脈とする記述もあるが、解剖学的には肝下縁が一般的。", "blanks": {"②": "Calot（カロー）三角", "③": "肝下縁"}}, {"id": "t-15-3", "text": "胆嚢は胆汁を貯蔵・濃縮し、十二指腸に食物が流入すると【 ④ 】の作用によって収縮し、胆汁を送り出す。", "blanks": {"④": "コレシストキニン"}}, {"id": "t-15-4", "text": "正常な胆嚢の大きさは、長径【 ⑤ 】cm以下、短径4cm以下、壁の厚さは【 ⑥ 】mm以下とされる。", "blanks": {"⑤": "8", "⑥": "3"}}, {"id": "t-15-5", "text": "胆道疾患が疑われる際、まず最初に行われる低侵襲な検査は【 ⑦ 】である。エコーでの胆石の典型所見は、強い反射（ストロングエコー）と、その背後に生じる【 ⑧ 】である。", "blanks": {"⑦": "腹部超音波検査（エコー）", "⑧": "acoustic shadow（音響陰影）"}}, {"id": "t-15-6", "text": "【 ⑨ 】は、磁気共鳴を用いた非侵襲的な胆道造影法であり、造影剤や内視鏡を使わずに胆管・膵管を記述できるが、組織採取（生検）や治療はできない。", "blanks": {"⑨": "MRCP"}}, {"id": "t-15-7", "text": "一方、【 ⑩ 】は侵襲的で【 ⑪ 】などの偶発症リスクがあるが、直接造影や細胞診、胆道ドレナージなどの治療が可能である。", "blanks": {"⑩": "ERCP（内視鏡的逆行性胆管膵管造影）", "⑪": "膵炎"}}, {"id": "t-15-8", "text": "胆道癌の病変の局在や進展度（ステージ）診断に必須の検査は【 ⑫ 】である。", "blanks": {"⑫": "MDCT（多検出器列CT）"}}, {"id": "t-15-9", "text": "胆石の種類は、わが国では【 ⑬ 】が最も多く（約78%）、次いでビリルビンカルシウム石、黒色石と続く。", "blanks": {"⑬": "コレステロール石"}}, {"id": "t-15-10", "text": "胆石症の危険因子として「5F」が知られており、Fair（白人）、Fatty（肥満）、Female（女性）、【 ⑭ 】、Fecund（多産）が含まれる。", "blanks": {"⑭": "Forty/Fifty（40〜50代）"}}, {"id": "t-15-11", "text": "急性胆嚢炎の身体所見として、右上腹部を圧迫した状態で深呼吸させると、痛みで呼吸が止まる【 ⑮ 】が有名である。", "blanks": {"⑮": "Murphy（マーフィー）徴候"}}, {"id": "t-15-12", "text": "【 ⑯ 】は、胆道の通過障害（結石や腫瘍）と細菌感染により生じ、急速に重症化し敗血症を来す危険がある。", "blanks": {"⑯": "急性胆管炎"}}, {"id": "t-15-13", "text": "急性胆管炎の診断における【 ⑰ 】は、腹痛、発熱、【 ⑱ 】である。これに意識障害とショックが加わったものを【 ⑲ 】と呼び、緊急ドレナージを要する。", "blanks": {"⑰": "Charcot（シャルコー）の三徴", "⑱": "黄疸", "⑲": "Reynolds（レイノルズ）の五徴"}}, {"id": "t-15-14", "text": "急性胆管炎の初期治療は、絶飲食、輸液、抗菌薬投与に加え、速やかな【 ⑳ 】による減圧が最優先される。", "blanks": {"⑳": "胆道ドレナージ"}}, {"id": "t-15-15", "text": "【 ㉑ 】は、膵管と胆管が十二指腸壁外で合流する先天異常であり、膵液と胆汁の相互逆流により【 ㉒ 】の発生リスクが極めて高くなる。", "blanks": {"㉑": "膵・胆管合流異常", "㉒": "胆道癌"}}, {"id": "t-15-16", "text": "【 ㉓ 】は東洋人の女性に多く、腹部腫瘤、腹痛、【 ㉔ 】が三徴とされる。", "blanks": {"㉓": "先天性胆道拡張症", "㉔": "黄疸"}}, {"id": "t-15-17", "text": "胆嚢癌の危険因子には、膵胆管合流異常のほか、10mm以上の【 ㉕ 】、胆嚢腺筋腫症、【 ㉖ 】などが挙げられる。", "blanks": {"㉕": "胆嚢ポリープ", "㉖": "肥満"}}, {"id": "t-15-18", "text": "下部胆管癌や膵頭部癌などで、胆管が閉塞し無痛性に胆嚢が腫大して触知される所見を【 ㉗ 】と呼ぶ。", "blanks": {"㉗": "Courvoisier（クールボアジェ）徴候"}}, {"id": "t-15-19", "text": "胆道癌の主要な腫瘍マーカーは【 ㉘ 】（陽性率約69%）やCEAであるが、これらは特異的ではなく、他臓器の癌や胆汁うっ滞でも上昇する。", "blanks": {"㉘": "CA19-9"}}, {"id": "t-15-20", "text": "外科的手術において、【 ㉙ 】に対する標準術式は【 ㉚ 】である。", "blanks": {"㉙": "遠位（下部）胆管癌", "㉚": "膵頭十二指腸切除術（PD）"}}, {"id": "t-15-21", "text": "【 ㉛ 】に対しては、肝切除と肝外胆管切除を組み合わせた拡大手術が行われ、【 ㉜ 】の合併切除も原則必要とされる。", "blanks": {"㉛": "肝門部領域胆管癌", "㉜": "尾状葉"}}, {"id": "t-15-22", "text": "【 ㉝ 】の手術は、原則として【 ㉞ 】手術が行われる。進行癌では胆嚢摘出に加え、肝床部切除やリンパ節郭清が必要となる。", "blanks": {"㉝": "胆嚢癌", "㉞": "開腹"}}]}, {"title": "胆道疾患（診断と治療）", "short": "胆道・脾臓", "icon": "🏃", "questions": [{"id": "t-16-1", "text": "胆道とは、肝細胞から分泌された胆汁が十二指腸に流出するまでの全排泄経路であり、胆管（肝内・肝外）、胆嚢、【 ① 】が含まれる。", "blanks": {"①": "十二指腸乳頭部"}}, {"id": "t-16-2", "text": "外科手術において重要な【 ② 】を構成する3辺は、胆嚢管、総肝管、および【 ③ 】である。", "blanks": {"②": "Calot（カロー）三角", "③": "肝下縁"}}, {"id": "t-16-3", "text": "【 ④ 】は、通常この Calot 三角の中を走行している。", "blanks": {"④": "胆嚢動脈"}}, {"id": "t-16-4", "text": "胆嚢は、十二指腸へ食物が流入した際に分泌される【 ⑤ 】の作用により、収縮して胆汁を送り出す。", "blanks": {"⑤": "コレシストキニン"}}, {"id": "t-16-5", "text": "胆石症の危険因子「5F」とは、女性(Female)、肥満(Fatty)、白人(Fair)、多産(Fecund)、および【 ⑥ 】である。", "blanks": {"⑥": "40代/50代（Forty/Fifty）"}}, {"id": "t-16-6", "text": "急性胆嚢炎の身体所見として、右上腹部を圧迫した状態で深呼吸させると痛みで呼吸が止まる【 ⑦ 】が有名である。", "blanks": {"⑦": "Murphy（マーフィー）徴候"}}, {"id": "t-16-7", "text": "急性胆管炎の診断における【 ⑧ 】は、腹痛、発熱、【 ⑨ 】である。", "blanks": {"⑧": "Charcot（シャルコー）の三徴", "⑨": "黄疸"}}, {"id": "t-16-8", "text": "Charcot の三徴に、意識障害と【 ⑩ 】が加わったものを【 ⑪ 】と呼び、緊急ドレナージが必要な重症病態（急性閉塞性化膿性胆管炎）を示唆する。", "blanks": {"⑩": "ショック", "⑪": "Reynolds（レイノルズ）の五徴"}}, {"id": "t-16-9", "text": "胆道疾患の第一選択治療として、胆嚢結石・胆嚢炎では【 ⑫ 】が、総胆管結石・胆管炎では【 ⑬ 】が優先される。", "blanks": {"⑫": "外科的治療（胆摘）", "⑬": "内視鏡的治療（切石・ドレナージ）"}}, {"id": "t-16-10", "text": "【 ⑭ 】は、膵管と胆管が十二指腸壁外で合流する先天異常であり、【 ⑮ 】の強力な危険因子となるため、予防的な分流手術（胆道再建）が検討される。", "blanks": {"⑭": "膵・胆管合流異常", "⑮": "胆道癌"}}, {"id": "t-16-11", "text": "原発性硬化性胆管炎（PSC）は、肝内外胆管の【 ⑯ 】の狭窄と拡張を特徴とし、画像上【 ⑰ 】の胆管像を呈する。", "blanks": {"⑯": "びまん性", "⑰": "数珠状 / 枯れ枝状"}}, {"id": "t-16-12", "text": "PSCは他の自己免疫性肝疾患と異なり【 ⑱ 】に多く、【 ⑲ 】の合併が約37%に認められる。", "blanks": {"⑱": "男性", "⑲": "潰瘍性大腸炎（UC）"}}, {"id": "t-16-13", "text": "腹部超音波検査において、胆石の典型所見は強い反射（ストロングエコー）とその背後の【 ⑳ 】である。", "blanks": {"⑳": "acoustic shadow（音響陰影）"}}, {"id": "t-16-14", "text": "【 ㉑ 】検査では、純コレステロール胆石は【 ㉒ 】ことがあるため注意を要する。", "blanks": {"㉑": "CT", "㉒": "写らない"}}, {"id": "t-16-15", "text": "【 ㉓ 】は、非侵襲的に胆管や膵管の形態を評価できるが、【 ㉔ 】は膵炎などの偶発症リスクがある一方で、直接造影や生検、治療的処置が可能である。", "blanks": {"㉓": "MRCP", "㉔": "ERCP"}}, {"id": "t-16-16", "text": "黄疸を伴う胆管炎などで行われるドレナージ法のうち、鼻からチューブを出す手法を【 ㉕ 】、皮膚から肝臓を介して刺す手法を【 ㉖ 】と呼ぶ。", "blanks": {"㉕": "ENBD（内視鏡的経鼻胆道ドレナージ）", "㉖": "PTBD（経皮経肝胆道ドレナージ）"}}, {"id": "t-16-17", "text": "下部胆管癌や膵頭部癌において、胆管の閉塞により無痛性に腫大した胆嚢が触知される所見を【 ㉗ 】と呼ぶ。", "blanks": {"㉗": "Courvoisier（クールボアジェ）徴候"}}, {"id": "t-16-18", "text": "【 ㉘ 】に対する標準的な術式は、【 ㉙ 】である。", "blanks": {"㉘": "遠位（下部）胆管癌", "㉙": "膵頭十二指腸切除術（PD）"}}, {"id": "t-16-19", "text": "【 ㉚ 】の手術では、肝切除と胆管切除に加え、原則として【 ㉛ 】の合併切除が必要となる。", "blanks": {"㉚": "肝門部領域胆管癌", "㉛": "尾状葉"}}, {"id": "t-16-20", "text": "胆嚢癌の外科手術は、腹腔鏡下ではなく【 ㉜ 】手術が原則である。", "blanks": {"㉜": "開腹"}}, {"id": "t-16-21", "text": "胆管癌に対する標準的な補助化学療法（ファーストライン）は、【 ㉝ 】併用療法である。", "blanks": {"㉝": "ゲムシタビン＋シスプラチン"}}]}, {"title": "膵臓疾患", "short": "膵(良性)", "icon": "🔴", "questions": [{"id": "t-17-1", "text": "膵臓は、腎臓などと同様に【 ① 】に位置する臓器であり、病変により背部痛を来しやすい。", "blanks": {"①": "後腹膜"}}, {"id": "t-17-2", "text": "膵機能のうち、インスリンやグルカゴンを分泌する機能を【 ② 】（約5%）、膵液を分泌する機能を【 ③ 】（約95%）と呼ぶ。", "blanks": {"②": "内分泌", "③": "外分泌"}}, {"id": "t-17-3", "text": "膵外分泌酵素のうち、タンパク質を分解するのはトリプシン、炭水化物を分解するのはアミラーゼ、【 ④ 】を分解するのはリパーゼである。", "blanks": {"④": "脂質"}}, {"id": "t-17-4", "text": "膵液は1日に約【 ⑤ 】ml分泌されるアルカリ性の等張液である。", "blanks": {"⑤": "1500"}}, {"id": "t-17-5", "text": "男性の急性膵炎の成因で最も多いのは【 ⑥ 】であり、女性では【 ⑦ 】が最も多い。", "blanks": {"⑥": "アルコール", "⑦": "胆石"}}, {"id": "t-17-6", "text": "血清【 ⑧ 】やリパーゼは診断に有用だが、その値は【 ⑨ 】とは必ずしも相関しない。", "blanks": {"⑧": "アミラーゼ", "⑨": "重症度"}}, {"id": "t-17-7", "text": "重症急性膵炎で見られる、臍周囲の皮下出血斑を【 ⑩ 】サイン、左側腹部のものを【 ⑪ 】サインと呼ぶ。", "blanks": {"⑩": "Cullen（カレン）", "⑪": "Grey-Turner（グレイ・ターナー）"}}, {"id": "t-17-8", "text": "厚生労働省の重症度判定（予後因子）には、BE、PaO2、BUN、LDH、血小板数、総Ca値、CRP【 ⑫ 】mg/dL以上、SIRS項目、年齢【 ⑬ 】歳以上が含まれる。", "blanks": {"⑫": "15", "⑬": "70"}}, {"id": "t-17-9", "text": "治療において、感染性膵壊死に対する【 ⑭ 】は、発症後【 ⑮ 】週以降に行うのが原則である。", "blanks": {"⑭": "ネクロセクトミー / 壊死物質除去術", "⑮": "4"}}, {"id": "t-17-10", "text": "慢性膵炎の成因も【 ⑯ 】が最多である。", "blanks": {"⑯": "アルコール"}}, {"id": "t-17-11", "text": "膵外分泌機能不全の指標として用いられる、キモトリプシンによる分解能を利用した検査は【 ⑰ 】試験である。", "blanks": {"⑰": "BT-PABA（PFD）"}}, {"id": "t-17-12", "text": "画像所見では、膵の萎縮とともに【 ⑱ 】の存在が特徴的である。", "blanks": {"⑱": "膵石"}}, {"id": "t-17-13", "text": "膵石合併慢性膵炎に対する外科治療のうち、膵頭部の芯抜きと膵管空腸側々吻合を組み合わせた術式は【 ⑲ 】手術である。", "blanks": {"⑲": "Frey（フレイ）"}}, {"id": "t-17-14", "text": "膵癌の危険因子には、喫煙、家族歴、糖尿病、慢性膵炎のほか、【 ⑳ 】やIPMNなどが挙げられる。", "blanks": {"⑳": "肥満"}}, {"id": "t-17-15", "text": "腫瘍マーカーの【 ㉑ 】やCEAは、早期診断よりも術後のフォローアップや予後予測に有用である。", "blanks": {"㉑": "CA19-9"}}, {"id": "t-17-16", "text": "ダイナミック造影CTにおいて、膵癌は周囲の膵実質に比べ【 ㉒ 】な腫瘤として描出される。", "blanks": {"㉒": "低信号 / 乏血性"}}, {"id": "t-17-17", "text": "根治切除後の5年生存率は【 ㉓ 】％前後と極めて予後不良である。", "blanks": {"㉓": "8〜10"}}, {"id": "t-17-18", "text": "【 ㉔ 】は、MRCP等で「ブドウの房状」の嚢胞として描出され、主膵管径が【 ㉕ 】mm以上の場合はHigh-risk stigmataとして手術が推奨される。", "blanks": {"㉔": "IPMN / 膵管内乳頭粘液性腫瘍", "㉕": "10"}}, {"id": "t-17-19", "text": "【 ㉖ 】は、中年女性の膵【 ㉗ 】に好発し、「夏みかん状」の単房〜多房性嚢胞を呈する。卵巣様間質が特徴であり、原則【 ㉘ 】適応である。", "blanks": {"㉖": "MCN / 粘液性嚢胞腫瘍", "㉗": "体尾部", "㉘": "手術"}}, {"id": "t-17-20", "text": "【 ㉙ 】は、「蜂巣状」の外観を呈し、中心部瘢痕や石灰化を伴う。多くは良性で経過観察される。", "blanks": {"㉙": "SCN / 漿液性嚢胞腫瘍"}}, {"id": "t-17-21", "text": "【 ㉚ 】は、若年女性の膵体尾部に好発し、出血や嚢胞変性を伴う充実性腫瘍である。", "blanks": {"㉚": "SPN / Solid-pseudopapillary neoplasm"}}, {"id": "t-17-22", "text": "膵神経内分泌腫瘍（PanNEN）は、造影CTで【 ㉛ 】を示すのが特徴である。", "blanks": {"㉛": "早期濃染 / 多血性"}}, {"id": "t-17-23", "text": "自己免疫性膵炎（わが国に多い1型）は、【 ㉜ 】に多く、血清【 ㉝ 】の上昇を伴う。", "blanks": {"㉜": "高齢男性", "㉝": "IgG4"}}, {"id": "t-17-24", "text": "画像所見では、膵のびまん性腫大【 ㉞ 】や、主膵管の不整狭細像が特徴である。", "blanks": {"㉞": "ソーセージ様"}}, {"id": "t-17-25", "text": "治療には【 ㉟ 】が著効する。", "blanks": {"㉟": "副腎皮質ステロイド"}}, {"id": "t-17-26", "text": "膵頭部領域の腫瘍に対する標準術式は【 ㊱ 】である。", "blanks": {"㊱": "膵頭十二指腸切除術（PD）"}}, {"id": "t-17-27", "text": "膵切除術後において最も重要かつ頻度の高い早期合併症は【 ㊲ 】である。", "blanks": {"㊲": "術後膵瘻"}}, {"id": "t-17-28", "text": "膵瘻の診断基準は、術後第3病日以降のドレーン排液【 ㊳ 】値が、血清基準上限値の【 ㊴ 】倍以上であることとされる。", "blanks": {"㊳": "アミラーゼ", "㊴": "3"}}, {"id": "t-17-29", "text": "膵【 ㊵ 】術後には、インスリン依存性の膵性糖尿病と外分泌不全（消化吸収障害）を必ず来す。", "blanks": {"㊵": "全摘"}}]}, {"title": "膵疾患（診断と治療）", "short": "膵疾患（", "icon": "🟡", "questions": [{"id": "t-18-1", "text": "急性膵炎の成因は、男性では【 ① 】が最多であり、女性では【 ② 】が最も多い。", "blanks": {"①": "アルコール", "②": "胆石性"}}, {"id": "t-18-2", "text": "診断基準では、「上腹部の急性腹痛と圧痛」「血中・尿中膵酵素の上昇」「画像検査での異常所見」の3項目中【 ③ 】項目以上を満たす必要がある。", "blanks": {"③": "2"}}, {"id": "t-18-3", "text": "膵酵素のうち、【 ④ 】はアミラーゼよりも膵特異性が高い。なお、血清アミラーゼ値は膵炎の【 ⑤ 】とは必ずしも相関しない。", "blanks": {"④": "リパーゼ", "⑤": "重症度"}}, {"id": "t-18-4", "text": "重症急性膵炎で見られる、臍周囲の皮下出血斑を【 ⑥ 】サイン、左側腹部のものを【 ⑦ 】サインと呼び、膵液による組織融解を示唆する。", "blanks": {"⑥": "Cullen（カレン）", "⑦": "Grey-Turner（グレイ・ターナー）"}}, {"id": "t-18-5", "text": "厚生労働省の重症度判定（予後因子）項目には、BE、PaO2、BUN、LDH、血小板数、総Ca値、CRP【 ⑧ 】mg/dL以上、SIRS 3項目以上、年齢【 ⑨ 】歳以上が含まれる。", "blanks": {"⑧": "15", "⑨": "70"}}, {"id": "t-18-6", "text": "治療の基本は、早期の【 ⑩ 】と栄養管理（早期経腸栄養）、感染予防である。感染性膵壊死に対する外科的介入（ネクロセクトミー）は、発症【 ⑪ 】週以降に行うのが原則である。", "blanks": {"⑩": "大量輸液", "⑪": "4"}}, {"id": "t-18-7", "text": "慢性膵炎の最大の原因は【 ⑫ 】（全体の約7割）である。", "blanks": {"⑫": "アルコール"}}, {"id": "t-18-8", "text": "膵外分泌機能不全の評価には、【 ⑬ 】試験が用いられる。", "blanks": {"⑬": "BT-PABA（PFD）"}}, {"id": "t-18-9", "text": "画像診断（CT等）では、膵の萎縮とともに【 ⑭ 】の存在や石灰化が特徴的である。", "blanks": {"⑭": "膵石"}}, {"id": "t-18-10", "text": "疼痛や膵管拡張を伴う慢性膵炎に対し、膵頭部の芯抜きと膵管空腸側々吻合を組み合わせた術式は【 ⑮ 】手術である。", "blanks": {"⑮": "Frey（フレイ）"}}, {"id": "t-18-11", "text": "わが国に多い1型AIPは、【 ⑯ 】に好発し、血清【 ⑰ 】値の上昇を特徴とする。", "blanks": {"⑯": "高齢男性", "⑰": "IgG4"}}, {"id": "t-18-12", "text": "特徴的な画像所見は、膵のびまん性腫大【 ⑱ 】と、主膵管の【 ⑲ 】像である。", "blanks": {"⑱": "ソーセージ様", "⑲": "不整狭細"}}, {"id": "t-18-13", "text": "治療には【 ⑳ 】が著効するが、膵癌との鑑別が極めて重要であり、必要に応じて【 ㉑ 】を行う。", "blanks": {"⑳": "副腎皮質ステロイド", "㉑": "EUS-FNA（超音波内視鏡下穿刺吸引生検）"}}, {"id": "t-18-14", "text": "膵外病変として、硬化性胆管炎、涙腺・唾液腺炎、【 ㉒ 】などを合併しやすい。", "blanks": {"㉒": "後腹膜線維症"}}, {"id": "t-18-15", "text": "膵癌の危険因子には、喫煙、家族歴、糖尿病、慢性膵炎のほか、【 ㉓ 】やIPMNが挙げられる。", "blanks": {"㉓": "肥満"}}, {"id": "t-18-16", "text": "ダイナミック造影CTにおいて、典型的な膵癌は周囲の膵実質に比べて【 ㉔ 】な腫瘤として描出される。", "blanks": {"㉔": "乏血性（低吸収）"}}, {"id": "t-18-17", "text": "腫瘍マーカー（CA19-9やCEA）は、早期診断よりも術後の【 ㉕ 】や予後予測に有用である。", "blanks": {"㉕": "フォローアップ"}}, {"id": "t-18-18", "text": "切除可能性の判断には、腹腔動脈（CA）や【 ㉖ 】などの主要動脈への浸潤の有無が重要である。", "blanks": {"㉖": "上腸間膜動脈（SMA）"}}, {"id": "t-18-19", "text": "【 ㉗ 】は、MRCP等で【 ㉘ 】の嚢胞として描出され、主膵管径が【 ㉙ 】mm以上の場合は手術適応（High-risk stigmata）となる。", "blanks": {"㉗": "IPMN（膵管内乳頭粘液性腫瘍）", "㉘": "ぶどうの房状", "㉙": "10"}}, {"id": "t-18-20", "text": "【 ㉚ 】は、【 ㉛ 】の膵【 ㉜ 】に好発し、卵巣様間質を有するため、原則として切除適応となる。", "blanks": {"㉚": "MCN（粘液性嚢胞腫瘍）", "㉛": "中年女性", "㉜": "体尾部"}}, {"id": "t-18-21", "text": "【 ㉝ 】は、【 ㉞ 】の外観を呈し、中心部瘢痕を伴うことがある。多くは良性で経過観察される。", "blanks": {"㉝": "SCN（漿液性嚢胞腫瘍）", "㉞": "蜂巣状"}}, {"id": "t-18-22", "text": "【 ㉟ 】は、若年女性に好発し、出血や嚢胞変性を伴う充実性腫瘍であり、低悪性度だが手術適応である。", "blanks": {"㉟": "SPN（Solid-pseudopapillary neoplasm）"}}, {"id": "t-18-23", "text": "膵頭部癌や遠位胆管癌に対する標準術式は【 ㊱ 】である。", "blanks": {"㊱": "膵頭十二指腸切除術（PD）"}}, {"id": "t-18-24", "text": "膵切除後において最も重要かつ頻度の高い合併症は【 ㊲ 】である。", "blanks": {"㊲": "術後膵瘻"}}, {"id": "t-18-25", "text": "膵瘻の診断基準（ISGPS）は、術後第3病日以降のドレーン排液【 ㊳ 】値が、血清基準上限値の【 ㊴ 】倍以上であることとされる。", "blanks": {"㊳": "アミラーゼ", "㊴": "3"}}, {"id": "t-18-26", "text": "膵全摘術後には、必ず【 ㊵ 】と外分泌不全を来すため、生涯にわたる補充療法が必要となる。", "blanks": {"㊵": "膵性糖尿病"}}]}, {"title": "腹壁疾患・後腹膜腫瘍・ヘルニア・腸閉塞", "short": "腹壁疾患", "icon": "🚨", "questions": [{"id": "t-19-1", "text": "腹壁の良性腫瘍である【 ① 】は、腹壁筋膜から発生し、浸潤性発育を示すため境界不明瞭である。転移はしないが、切除後の【 ② 】が高いという特徴がある。", "blanks": {"①": "デスモイド / 類腱腫", "②": "再発率"}}, {"id": "t-19-2", "text": "【 ③ 】は、粘液やゼラチン様物質を産生する腫瘍の腹膜播種であり、中高年の【 ④ 】に好発する。腹部膨満は著明だが、腸閉塞症状はまれである。", "blanks": {"③": "腹膜偽粘液腫", "④": "女性"}}, {"id": "t-19-3", "text": "手術時の結紮糸や異物を中心とした「大網」の炎症性肉芽腫を【 ⑤ 】と呼び、「腹壁」のものを【 ⑥ 】と呼ぶ。", "blanks": {"⑤": "Braun（ブラウン）腫瘤", "⑥": "Schloffer（シュローフェル）腫瘤"}}, {"id": "t-19-4", "text": "【 ⑦ 】は、後腹膜の線維性増殖により【 ⑧ 】を圧迫し、水腎症を来すことがある。", "blanks": {"⑦": "特発性後腹膜線維症", "⑧": "尿管"}}, {"id": "t-19-5", "text": "腹膜中皮腫は、中皮細胞由来の腫瘍であり、【 ⑨ 】粉塵の接触が関連している。", "blanks": {"⑨": "アスベスト"}}, {"id": "t-19-6", "text": "ヘルニアの構成成分は、出口であるヘルニア門、脱出するヘルニア内容、内容を包む【 ⑩ 】、および一番外側のヘルニア被膜である。", "blanks": {"⑩": "ヘルニア嚢"}}, {"id": "t-19-7", "text": "ヘルニア嚢を有するものを真性ヘルニア、有さないものを【 ⑪ 】と呼ぶ。臍帯ヘルニアは真性だが、【 ⑫ 】は仮性である。", "blanks": {"⑪": "仮性ヘルニア", "⑫": "腹壁破裂"}}, {"id": "t-19-8", "text": "腸管壁の一部のみが嵌頓した状態を【 ⑬ 】と呼び、全層が脱出していないため通過障害が目立たないことがある。", "blanks": {"⑬": "Richter（リヒター）ヘルニア"}}, {"id": "t-19-9", "text": "Meckel（メッケル）憩室が内容物となったヘルニアを【 ⑭ 】と呼ぶ。", "blanks": {"⑭": "Littre（リトル）ヘルニア"}}, {"id": "t-19-10", "text": "**外鼠径ヘルニア**は、鼠径管の【 ⑮ 】から脱出する。乳幼児では腹膜鞘状突起の閉鎖不全が原因となる。", "blanks": {"⑮": "内鼠径輪"}}, {"id": "t-19-11", "text": "**内鼠径ヘルニア**は、下腹壁動静脈の内側にある【 ⑯ 】をヘルニア門とする。", "blanks": {"⑯": "Hesselbach（ヘッセルバッハ）三角"}}, {"id": "t-19-12", "text": "**大腿ヘルニア**は、大腿管を通り鼠径靭帯の下方へ脱出する。大腿動静脈の【 ⑰ 】に位置し、嵌頓しやすいため診断がつけば速やかに手術を行う。", "blanks": {"⑰": "内側"}}, {"id": "t-19-13", "text": "**閉鎖孔ヘルニア**は、【 ⑱ 】に好発する。特徴的な症状として、閉鎖神経の圧迫により大腿内側に放散痛が生じる【 ⑲ 】徴候がある。", "blanks": {"⑱": "痩せた高齢女性", "⑲": "Howship-Romberg（ハウシップ・ロンベルグ）"}}, {"id": "t-19-14", "text": "閉鎖孔ヘルニアのCT画像では、【 ⑳ 】と外閉鎖筋の間に嵌頓した腸管を認めるのが特徴である。", "blanks": {"⑳": "恥骨筋"}}, {"id": "t-19-15", "text": "内ヘルニアの中で最も頻度が高いのは【 ㉑ 】である。", "blanks": {"㉑": "傍十二指腸ヘルニア"}}, {"id": "t-19-16", "text": "腸閉塞は、機械的障害による機械的腸閉塞と、【 ㉒ 】腸閉塞（イレウス）に大別される。", "blanks": {"㉒": "機能的"}}, {"id": "t-19-17", "text": "機械的腸閉塞のうち、血流障害を伴わないものを閉塞性（単純性）、血流障害を伴うものを【 ㉓ 】と呼ぶ。後者は腸管壊死からショックを来すため、緊急手術の適応となる。", "blanks": {"㉓": "絞扼性 / 複雑性"}}, {"id": "t-19-18", "text": "腹部単純X線検査（立位）において、腸液とガスの水平面である【 ㉔ 】を認める。また、小腸の拡張したガス像には【 ㉕ 】皺襞が認められる。", "blanks": {"㉔": "鏡面像 / niveau（ニボー）", "㉕": "Kerckring（ケルクリング）"}}, {"id": "t-19-19", "text": "造影CTにおいて、拡張した腸管が急激に虚脱する部位は【 ㉖ 】と呼ばれ、閉塞部位の特定に有用である。", "blanks": {"㉖": "caliber change"}}, {"id": "t-19-20", "text": "腸閉塞の治療において、腸管減圧のために【 ㉗ 】の挿入・留置が行われる。", "blanks": {"㉗": "イレウス管"}}]}, {"title": "消化器疾患のリハビリテーション", "short": "リハビリ", "icon": "⚖️", "questions": [{"id": "t-20-1", "text": "肝臓リハビリテーションとは、肝疾患に基づく身体的・精神的影響を軽減させ、症状を調整し、【 ① 】を改善することを目的とする。", "blanks": {"①": "生命予後"}}, {"id": "t-20-2", "text": "リハビリの内容は、運動療法、栄養療法、薬物療法、教育、【 ② 】などを行う長期間にわたる包括的なプログラムである。", "blanks": {"②": "精神・心理的サポート"}}, {"id": "t-20-3", "text": "NAFLD/NASHのリハビリテーションにおいては、食事療法または運動療法を単独で行うよりも、【 ③ 】がより効果的である。", "blanks": {"③": "両者の併用"}}, {"id": "t-20-4", "text": "リハビリテーションの効果は、【 ④ 】を伴わなくても、病態改善効果が示唆されている。", "blanks": {"④": "明らかな体重減少"}}, {"id": "t-20-5", "text": "対象患者本人だけでなく、【 ⑤ 】も交えた包括的なリハビリテーションが重要である。", "blanks": {"⑤": "家族"}}, {"id": "t-20-6", "text": "肝硬変患者の生命予後を規定する指標として、【 ⑥ 】や、血清アルブミン値、クレアチニン値などが重要である。", "blanks": {"⑥": "Child-Pugh（チャイルド・ピュー）分類"}}, {"id": "t-20-7", "text": "身体能力の指標として用いられる【 ⑦ 】は、肝硬変患者の生命予後決定因子として極めて重要である。", "blanks": {"⑦": "6分間歩行距離（6MWD）"}}, {"id": "t-20-8", "text": "生存曲線のデータによれば、6分間歩行距離が【 ⑧ 】m未満の群は、それ以上の群に比べて有意に生存率が低い。", "blanks": {"⑧": "250"}}, {"id": "t-20-9", "text": "血液検査項目のうち、【 ⑨ 】値などは、必ずしも肝硬変患者の生命予後規定因子とはならない。", "blanks": {"⑨": "GPT（ALT）"}}, {"id": "t-20-10", "text": "サルコペニアとは、加齢による原発性と、活動低下・栄養不足・疾患（肝硬変、がん等）による【 ⑩ 】に分けられる。", "blanks": {"⑩": "二次性"}}, {"id": "t-20-11", "text": "わが国の身体障害者福祉法において、「内部障害」に含まれる消化器関連の機能障害は、【 ⑭ 】機能障害と【 ⑮ 】機能障害である。", "blanks": {"⑭": "小腸", "⑮": "肝臓"}}, {"id": "t-20-12", "text": "一方で、【 ⑯ 】機能障害、【 ⑰ 】機能障害、【 ⑱ 】機能障害は、この法律における独立した内部障害の区分には含まれていない。", "blanks": {"⑯": "食道", "⑰": "胃", "⑱": "膵臓"}}, {"id": "t-20-13", "text": "身体障害者法で認定される肝臓機能障害の対象疾患には、ウイルス性肝炎、自己免疫性肝炎、薬剤性肝炎、代謝性肝疾患、および【 ⑲ 】の合併症などが含まれる。", "blanks": {"⑲": "肝移植後"}}, {"id": "t-20-14", "text": "ただし、【 ⑳ 】そのものは、肝臓機能障害の認定対象疾患リストには含まれない。", "blanks": {"⑳": "原発性肝癌"}}, {"id": "t-20-15", "text": "成人では【 ㉑ 】の運動を含んだ運動プログラムの有効性が示されている。", "blanks": {"㉑": "高強度"}}, {"id": "t-20-16", "text": "小児のNAFLDは、成人よりも【 ㉒ 】が有効であるとされる。", "blanks": {"㉒": "治療（非薬剤性治療）"}}, {"id": "t-20-17", "text": "肥満のない成人のNAFLD患者に対しても、【 ㉓ 】での有効性が示されている。", "blanks": {"㉓": "運動療法単独"}}, {"id": "t-20-18", "text": "運動療法は肝機能の改善だけでなく、【 ㉔ 】にも効果的である。", "blanks": {"㉔": "心血管機能"}}, {"id": "t-20-19", "text": "退院後も外来での【 ㉕ 】を継続することが重要である。", "blanks": {"㉕": "長期的フォロー"}}]}, {"title": "消化器疾患の薬理学", "short": "消化器疾", "icon": "🟢", "questions": [{"id": "t-21-1", "text": "胃の壁細胞には、胃酸分泌に関わる3つの受容体、すなわちヒスタミンH2受容体、ガストリン受容体（CCK2受容体）、および【 ① 】受容体が存在する。", "blanks": {"①": "ムスカリン（M3）"}}, {"id": "t-21-2", "text": "**H. pyloriの一次除菌**に用いられる薬剤は、アモキシシリン、クラリスロマイシン、および【 ② 】の3剤である。", "blanks": {"②": "PPI（プロトンポンプ阻害薬） または P-CAB"}}, {"id": "t-21-3", "text": "一次除菌に失敗した場合の**二次除菌**では、クラリスロマイシンの代わりに【 ③ 】が用いられる。", "blanks": {"③": "メトロニダゾール"}}, {"id": "t-21-4", "text": "除菌失敗の要因として、薬剤耐性、アドヒアランス低下、喫煙のほか、【 ④ 】などが挙げられる。なお、中和抗体の存在は除菌失敗の要因にはならない。", "blanks": {"④": "PPIの代謝個体差（CYP2C19）"}}, {"id": "t-21-5", "text": "**5-ASA（メサラジン等）**製剤は、潰瘍性大腸炎（UC）において【 ⑤ 】と【 ⑥ 】の両方に用いられる。", "blanks": {"⑤": "寛解導入", "⑥": "寛解維持"}}, {"id": "t-21-6", "text": "**副腎皮質ステロイド**は強力な寛解導入効果を持つが、副作用の観点から【 ⑦ 】には適さない。", "blanks": {"⑦": "寛解維持"}}, {"id": "t-21-7", "text": "免疫調節薬（アザチオプリン等）を使用する際は、【 ⑧ 】遺伝子多型を確認することで、重篤な副作用である白血球減少や脱毛のリスクを予測できる。", "blanks": {"⑧": "NUDT15"}}, {"id": "t-21-8", "text": "分子標的薬の**インフリキシマブ（レミケード）**は、【 ⑨ 】抗体であり、完全ヒト型ではなく【 ⑩ 】抗体製剤である。", "blanks": {"⑨": "抗TNFα", "⑩": "キメラ"}}, {"id": "t-21-9", "text": "インフリキシマブは結核などの感染症がある場合には【 ⑪ 】であり、投与中に効果が減弱する【 ⑫ 】が生じることがある。", "blanks": {"⑪": "禁忌", "⑫": "二次無効"}}, {"id": "t-21-10", "text": "**下痢型IBS**に対して用いられる【 ⑬ 】は、5-HT3受容体を遮断することで、アセチルコリンの遊離を抑制し、腸管運動を抑制する。", "blanks": {"⑬": "ラモセトロン"}}, {"id": "t-21-11", "text": "**機能性ディスペプシア（FD）**の治療薬【 ⑭ 】は、アセチルコリンエステラーゼを阻害することで、消化管運動を促進させる。", "blanks": {"⑭": "アコチアミド"}}, {"id": "t-21-12", "text": "高分子重合体である【 ⑮ 】は、便の水分を調節することで、下痢・便秘の両方の便形状を改善する。", "blanks": {"⑮": "ポリカルボフィルカルシウム"}}, {"id": "t-21-13", "text": "**ルビプロストン**は、小腸上皮細胞の【 ⑯ 】を刺激し、腸管内への水分分泌を促進することで便秘を改善する。", "blanks": {"⑯": "2型クロライド（塩素）チャネル"}}, {"id": "t-21-14", "text": "**リナクロチド**は、【 ⑰ 】受容体を刺激し、cGMP濃度を上昇させることで水分分泌を促し、内臓痛覚閾値を改善する作用も持つ。", "blanks": {"⑰": "グアニル酸シクラーゼC"}}, {"id": "t-21-15", "text": "**胆汁酸トランスポーター阻害薬（エロビキシバット）**は、【 ⑱ 】での胆汁酸の再吸収を阻害し、大腸への胆汁酸流入を増やすことで排便を促す。", "blanks": {"⑱": "回腸末端"}}, {"id": "t-21-16", "text": "塩類下剤の【 ⑲ 】は、高マグネシウム血症のリスクがあるため、腎機能障害患者への投与には注意が必要である。", "blanks": {"⑲": "酸化マグネシウム"}}, {"id": "t-21-17", "text": "【 ⑳ 】などの抗コリン薬は、平滑筋の収縮を抑え腹痛を緩和するが、副作用として【 ㉑ 】や眼圧上昇を来すため、前立腺肥大症や緑内障の患者には禁忌である。", "blanks": {"⑳": "ブチルスコポラミン（ブスコパン）", "㉑": "尿閉"}}, {"id": "t-21-18", "text": "強オピオイドの【 ㉒ 】や止瀉薬のロペラミドは、μ受容体を刺激して消化管運動を抑制するため、副作用として便秘を来しやすい。", "blanks": {"㉒": "モルヒネ"}}, {"id": "t-21-19", "text": "ロペラミドを潰瘍性大腸炎（活動期）に使用すると、【 ㉓ 】を誘発する恐れがあるため注意を要する。", "blanks": {"㉓": "中毒性巨大結腸症"}}, {"id": "t-21-20", "text": "切除不能な**肝細胞癌（HCC）**の一次薬物療法として、【 ㉔ 】（抗PD-L1抗体）と【 ㉕ 】（抗VEGF抗体）の併用療法などが標準的に用いられる。", "blanks": {"㉔": "アテゾリズマブ", "㉕": "ベバシズマブ"}}]}];
const BLANK_RE = /【\s*([\u2460-\u2473\u3251-\u325f\u32b1-\u32bf])\s*】/g;


let state = {
  section: 'all',
  unmasteredOnly: false,
  mastered: JSON.parse(localStorage.getItem('taisaku_mastered') || '{}'),
};

function saveMastered(){
  localStorage.setItem('taisaku_mastered', JSON.stringify(state.mastered));
}

function renderTabs(){
  const nav = document.getElementById('tabs');
  let html = '<div class="tab active" data-sec="all" onclick="selectTab(this)">おすすめ</div>';
  QUIZ_DATA.forEach((s,i) => {
    html += `<div class="tab" data-sec="${i}" onclick="selectTab(this)">${s.short}</div>`;
  });
  nav.innerHTML = html;
}
function selectTab(el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  state.section = el.dataset.sec;
  renderTimeline();
}

function getVisibleQuestions(){
  let qs = [];
  QUIZ_DATA.forEach((sec, si) => {
    if(state.section !== 'all' && state.section !== String(si)) return;
    sec.questions.forEach(q => {
      if(state.unmasteredOnly && state.mastered[q.id]) return;
      qs.push({...q, secTitle: sec.title, secShort: sec.short, secIcon: sec.icon});
    });
  });
  return qs;
}

const SVG_HEART_FILLED = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.884 13.19c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"></path></svg>`;
const SVG_VIEWS = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.75 21V3h2v18h-2zM18 21V8.5h2V21h-2zM4 21l.004-10h2L6 21H4zm9.248 0v-7h2v7h-2z"></path></svg>`;
const SVG_BM = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4.5C4 3.12 5.119 2 6.5 2h11C18.881 2 20 3.12 20 4.5v18.44l-8-5.71-8 5.71V4.5zM6.5 4c-.276 0-.5.22-.5.5v14.56l6-4.29 6 4.29V4.5c0-.28-.224-.5-.5-.5h-11z"></path></svg>`;
const SVG_SHARE = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.59l5.7 5.7-1.41 1.42L13 6.41V16h-2V6.41l-3.3 3.3-1.41-1.42L12 2.59zM21 15l-.02 3.51c0 1.38-1.12 2.49-2.5 2.49H5.5C4.11 21 3 19.88 3 18.5V15h2v3.5c0 .28.22.5.5.5h12.98c.28 0 .5-.22.5-.5L19 15h2z"></path></svg>`;
const SVG_DOTS = `<svg viewBox="0 0 24 24" aria-hidden="true" style="width:18.75px;height:18.75px;fill:var(--sub)"><path d="M3 12c0-1.1.9-2 2-2s2 .9 2 2-.9 2-2 2-2-.9-2-2zm9 2c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm7 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"></path></svg>`;

function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return hash;
}

function renderTimeline(){
  const main = document.getElementById('timeline');
  const qs = getVisibleQuestions();
  if(!qs.length){
    main.innerHTML = '<div class="empty-msg">🎉 表示するツイートがありません</div>';
    updateProgress();
    return;
  }
  let html = '';
  qs.forEach(q => {
    const isMastered = state.mastered[q.id];
    let body = '';
    let last = 0;
    let raw = q.text;
    let match;
    let re = new RegExp(BLANK_RE.source, 'g');
    while((match = re.exec(raw)) !== null){
      body += escHtml(raw.slice(last, match.index));
      const label = match[1];
      const answer = q.blanks[label] || '???';
      body += `<button class="blank" data-qid="${q.id}" data-label="${label}" data-answer="${escAttr(answer)}" onclick="revealBlank(this)">${label}</button>`;
      last = re.lastIndex;
    }
    body += escHtml(raw.slice(last));

    // Determine fake time
    const hash = Math.abs(hashCode(q.id));
    const timeNum = hash % 60 + 1;
    const timeStr = hash % 2 === 0 ? `${timeNum}分` : `${timeNum%24 + 1}時間`;
    const replies = hash % 12;
    const views = hash % 500 + 10;
    const rts = hash % 5;

    html += `<div class="card${isMastered?' mastered':''}" data-qid="${q.id}">
      <div class="card-left">
        <div class="avatar">${q.secIcon}</div>
      </div>
      <div class="card-right">
        <div class="card-head">
          <div class="meta">
            <span class="display-name">${escHtml(q.secTitle)}</span>
            <span class="handle">@${escHtml(q.secShort)}</span>
            <span class="dot">·</span>
            <span class="time">${timeStr}</span>
          </div>
          <div style="color:var(--sub);cursor:pointer">${SVG_DOTS}</div>
        </div>
        <div class="card-body">${body}</div>
        <div class="actions">
          <div class="action-group">
            <button class="action-btn reply-btn">
              <span class="icon">${SVG_REPLY}</span>
              <span class="count">${replies||''}</span>
            </button>
          </div>
          <div class="action-group">
            <button class="action-btn rt-btn" onclick="resetCard('${q.id}')">
              <span class="icon">${SVG_RT}</span>
              <span class="count">${rts||''}</span>
            </button>
          </div>
          <div class="action-group">
            <button class="action-btn like-btn${isMastered?' hearted':''}" onclick="toggleMaster('${q.id}',this)">
              <span class="icon">${isMastered ? SVG_HEART_FILLED : SVG_HEART}</span>
              <span class="count">${isMastered?'1':'0'}</span>
            </button>
          </div>
          <div class="action-group">
            <button class="action-btn view-btn">
              <span class="icon">${SVG_VIEWS}</span>
              <span class="count">${views}</span>
            </button>
          </div>
          <div class="action-group right-actions">
            <button class="action-btn bm-btn"><span class="icon">${SVG_BM}</span></button>
            <button class="action-btn share-btn"><span class="icon">${SVG_SHARE}</span></button>
          </div>
        </div>
      </div>
    </div>`;
  });
  main.innerHTML = html;
  updateProgress();
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s){
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function revealBlank(el){
  if(el.classList.contains('revealed')) return;
  el.classList.add('revealed');
  el.textContent = el.dataset.answer;
}

function toggleMaster(qid, btn){
  if(state.mastered[qid]){
    delete state.mastered[qid];
  } else {
    state.mastered[qid] = true;
  }
  saveMastered();
  renderTimeline();
}

function resetCard(qid){
  delete state.mastered[qid];
  saveMastered();
  renderTimeline();
}

function toggleUnmastered(){
  state.unmasteredOnly = !state.unmasteredOnly;
  document.getElementById('btn-unmastered').classList.toggle('on', state.unmasteredOnly);
  renderTimeline();
}

function shuffleCards(){
  QUIZ_DATA.forEach(sec => {
    for(let i = sec.questions.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [sec.questions[i], sec.questions[j]] = [sec.questions[j], sec.questions[i]];
    }
  });
  renderTimeline();
}

function resetShuffle(){
  QUIZ_DATA.forEach(sec => {
    sec.questions.sort((a, b) => {
      let aNum = parseInt(a.id.split('-').pop());
      let bNum = parseInt(b.id.split('-').pop());
      return aNum - bNum;
    });
  });
  renderTimeline();
}

function revealAll(){
  document.querySelectorAll('.blank:not(.revealed)').forEach(el => {
    el.classList.add('revealed');
    el.textContent = el.dataset.answer;
  });
}

function resetAll(){
  if(!confirm('全ての「覚えた」をリセットしますか？')) return;
  state.mastered = {};
  saveMastered();
  renderTimeline();
}

function updateProgress(){
  const total = QUIZ_DATA.reduce((a,s) => a + s.questions.length, 0);
  const done = Object.keys(state.mastered).length;
  document.getElementById('progress').textContent = `${done} / ${total} 完了`;
}

let lastScrollY = window.scrollY;
window.addEventListener('scroll', () => {
  const currentScrollY = window.scrollY;
  const bottomNav = document.getElementById('bottom-nav');
  const fab = document.getElementById('fab');
  const topBar = document.getElementById('top-bar');
  
  if (currentScrollY > lastScrollY && currentScrollY > 50) {
    bottomNav.classList.add('hidden');
    fab.classList.add('hidden');
    topBar.classList.add('hidden');
  } else {
    bottomNav.classList.remove('hidden');
    fab.classList.remove('hidden');
    topBar.classList.remove('hidden');
  }
  lastScrollY = currentScrollY;
}, { passive: true });

renderTabs();
renderTimeline();
</script>
</body>
</html>
